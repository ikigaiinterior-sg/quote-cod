<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#F8F4EF;font-family:'Quicksand','Helvetica Neue',sans-serif;}
input[type="number"]::-webkit-inner-spin-button,input[type="number"]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}
input[type="number"]{-moz-appearance:textfield;}
input:focus,textarea:focus,select:focus{outline:2px solid #C2A46E;outline-offset:-1px;}
canvas{touch-action:none;}
/* Print filtering is driven by JS (beforeprint adds body.printing) so it works for
   native Cmd+P, not only @media print. Both selectors are kept as belt-and-suspenders.
   Only .print-section (the selected-items quote document) prints; everything else —
   topbar, edit grid, qty inputs, nav, signature/payment tabs — carries .no-print. */
body.printing{background:#fff;}
body.printing .no-print{display:none!important;}

/* ── PRINT LAYOUT ─────────────────────────────────────────────────────────────
   Sections flow continuously and only break when they must. Previously every
   section carried `page-break-after:always`, which forced a break after each one
   and routinely produced a trailing blank page. Now: break BEFORE a new section
   (never after), so the last page ends where the content ends.                */
body.printing .print-section{
  display:block!important;
  border:none!important;border-radius:0!important;box-shadow:none!important;
  background:#fff!important;
  break-before:page;page-break-before:always;
  break-after:auto;page-break-after:auto;
  break-inside:auto;
  padding:0!important;
}
body.printing .print-section:first-of-type{break-before:auto;page-break-before:auto;}
/* A section header must never be stranded at the foot of a page with nothing under it. */
body.printing .print-section > div:first-child{break-after:avoid;page-break-after:avoid;}
body.printing .print-section:empty{display:none!important;break-before:auto;page-break-before:auto;}

/* Summary-only scope */
body.printing.summary-only .print-section{display:none!important;}
body.printing.summary-only .print-section.summary-doc{display:block!important;break-before:auto;page-break-before:auto;}

/* Keep atomic blocks whole — rows, signature panels, totals, cards */
body.printing tr,
body.printing .pr-row,
body.printing .pr-keep,
body.printing canvas{break-inside:avoid;page-break-inside:avoid;}

/* Orphan/widow control so tables don't leave one stray line on a page */
body.printing p,body.printing div{orphans:3;widows:3;}

/* Kill on-screen chrome that wastes vertical space on paper */
body.printing input,body.printing textarea,body.printing select{
  border:none!important;background:transparent!important;padding:0!important;
  -webkit-appearance:none;appearance:none;resize:none!important;
}
body.printing textarea{overflow:hidden!important;height:auto!important;min-height:0!important;}
/* Tighten the paper layout — screen padding is generous, paper is not */
body.printing .print-section > div{margin-bottom:8px!important;}
body.printing canvas{max-height:64px!important;}
/* Empty signature canvases still occupy a box on paper — collapse the dashed frame */
body.printing .print-section [style*="dashed"]{border-style:solid!important;border-color:#DDD!important;}

@media print{
  .no-print{display:none!important;}
  body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .print-section{
    display:block!important;background:#fff!important;
    border:none!important;border-radius:0!important;box-shadow:none!important;
    break-before:page;page-break-before:always;
    break-after:auto;page-break-after:auto;
  }
  .print-section:first-of-type{break-before:auto;page-break-before:auto;}
  .print-section:empty{display:none!important;break-before:auto;page-break-before:auto;}
  tr,.pr-row,.pr-keep,canvas{break-inside:avoid;page-break-inside:avoid;}
  p,div{orphans:3;widows:3;}
  @page{margin:14mm;size:A4;}
}
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:#F8F4EF;}
::-webkit-scrollbar-thumb{background:#E0D8CE;border-radius:3px;}
.trade-nav::-webkit-scrollbar{height:0;width:0;display:none;}
.trade-nav{scrollbar-width:none;-ms-overflow-style:none;}
@media print{
  .no-print{display:none !important;}
  .print-only-disc{display:grid !important;}
}
body.printing .no-print{display:none !important;}
body.printing .print-only-disc{display:grid !important;}
</style>

const issueRef=async(entity)=>{
  const now=new Date();const yy=String(now.getFullYear()).slice(2);const mm=String(now.getMonth()+1).padStart(2,"0");
  const pre=entity==="atelier"?"ia":"ii";
  const{data,error}=await sb.rpc("next_seq",{k:`${pre}-${yy}${mm}`});
  if(error||data==null)return null;
  return `${pre}-${yy}${mm}-${String(data).padStart(3,"0")}`;
};

let CLOUD=[];let CLOUD_READY=false;
const loadVersions=()=>CLOUD;
const saveVersions=v=>{CLOUD=v;localStorage.setItem(STORAGE_KEY,JSON.stringify(v));};
const TRASH_DAYS=30;
const daysLeft=q=>{if(!q||!q.deletedAt)return null;const d=Math.ceil((TRASH_DAYS*864e5-(Date.now()-q.deletedAt))/864e5);return d;};
const cloudPull=async()=>{
  const{data,error}=await sb.from("quotes").select("id,payload").order("id",{ascending:false});
  if(error){console.error("cloud pull",error);
    try{CLOUD=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");}catch{CLOUD=[];}
    CLOUD_READY=true;return CLOUD;}
  CLOUD=(data||[]).map(r=>r.payload);
  // one-time migration of any local-only quotes
  let local=[];try{local=JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]");}catch{}
  const ids=new Set(CLOUD.map(q=>q.id));
  const orphans=local.filter(q=>!ids.has(q.id));
  if(orphans.length){
    await sb.from("quotes").upsert(orphans.map(q=>({id:q.id,ref:q.client?.ref||null,payload:q})));
    CLOUD=[...orphans,...CLOUD];
  }
  // Auto-purge: anything sitting in Trash beyond the retention window is destroyed on load.
  // (A web app cannot self-trigger, so the purge happens the next time anyone opens it —
  //  30 days is therefore a floor, not an exact expiry. That is acceptable.)
  const expired=CLOUD.filter(q=>q.deletedAt&&(Date.now()-q.deletedAt)>TRASH_DAYS*864e5);
  if(expired.length){
    await sb.from("quotes").delete().in("id",expired.map(q=>q.id));
    const gone=new Set(expired.map(q=>q.id));
    CLOUD=CLOUD.filter(q=>!gone.has(q.id));
    localStorage.setItem(STORAGE_KEY,JSON.stringify(CLOUD));
  }
  CLOUD_READY=true;return CLOUD;
};
const cloudPush=async q=>{await sb.from("quotes").upsert({id:q.id,ref:q.client?.ref||null,payload:q});};
const cloudDelete=async id=>{await sb.from("quotes").delete().eq("id",id);};
const loadTrades=()=>{
  try{
    const ov=JSON.parse(localStorage.getItem(RATECARD_KEY)||"null");
    if(!ov)return DEFAULT_TRADES;
    return DEFAULT_TRADES.map(t=>({...t,items:t.items.map(i=>{const o=ov[i.id];return o?{...i,...o}:i;})}));

};

// Pure recompute of a saved quote's total — used to snapshot the parent value onto a VO.
const calcQuoteTotal=q=>{
  if(!q)return 0;
  const TR=loadTrades();
  const ent=ENTITIES.find(e=>e.id===(q.entity||"ikigai"))||ENTITIES[0];
  const on=id=>q.itemOn&&q.itemOn[id]===true;
  const qty=id=>parseFloat((q.qtys||{})[id])||0;
  const poa=id=>{const v=(q.poaPrices||{})[id];return(v!==undefined&&v!==null&&v!=="")?(parseFloat(v)||0):null;};
  const okPoa=id=>{const v=(q.poaPrices||{})[id];const edited=(v!==undefined&&v!==null&&v!=="");return!edited||((q.poaApproved||{})[id]===true);};
  const ep=i=>{const m=poa(i.id);if(m!==null)return m;const t=(q.tiers||{})[i.id]||"base";if(!i.carpentry||t==="base")return i.price;return Math.round(i.price*FINISH[t].mult*100)/100;};
  let sum=0;
  // design
  const sqft=q.unitSqft||0;
  DESIGN_ITEMS_CFG.forEach(i=>{
    if(!(q.designOn||{})[i.id])return;
    if(i.fixedPrice!==null)sum+=i.fixedPrice;
    else if(i.basis==="raw")sum+=Math.round(sqft*(i.psfPct||0));
    else sum+=Math.round(sqft*DESIGN_PSF_RATE*(i.psfPct||0));
  });
  TR.forEach(t=>{
    t.items.forEach(i=>{if(on(i.id)&&okPoa(i.id))sum+=qty(i.id)*ep(i);});
    (q.dupes||[]).filter(d=>d.tradeId===t.id).forEach(d=>{if(on(d.id)&&okPoa(d.id))sum+=qty(d.id)*d.price;});
    (q.customs||[]).filter(c=>c.tradeId===t.id&&c.approved).forEach(c=>{if(on(c.id))sum+=(parseFloat((q.qtys||{})[c.id])||1)*c.price;});
  });
  const d=(q.discOk?(parseFloat(q.disc)||0):0);
  const after=sum-d;
  return ent.gst?after*1.09:after;
};

// ── SIGNATURE CANVAS ──────────────────────────────────────────────────────────
function SigCanvas({value,onChange,label,locked}){
  const ref=useRef(null);
  const drawing=useRef(false);
  const lastPos=useRef(null);

  const getPos=(e,canvas)=>{
    const r=canvas.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-r.left)*(canvas.width/r.width),y:(src.clientY-r.top)*(canvas.height/r.height)};
  };

  useEffect(()=>{
    const c=ref.current;if(!c)return;
    const ctx=c.getContext("2d");
    if(value){const img=new Image();img.onload=()=>{ctx.clearRect(0,0,c.width,c.height);ctx.drawImage(img,0,0);};img.src=value;}
    else{ctx.clearRect(0,0,c.width,c.height);}
  },[value]);

  const start=e=>{
    if(locked)return;
    e.preventDefault();
    drawing.current=true;
    lastPos.current=getPos(e,ref.current);
  };
  const move=e=>{
    if(!drawing.current||locked)return;
    e.preventDefault();
    const c=ref.current;const ctx=c.getContext("2d");
    const pos=getPos(e,c);
    ctx.beginPath();ctx.moveTo(lastPos.current.x,lastPos.current.y);
    ctx.lineTo(pos.x,pos.y);
    ctx.strokeStyle=C.ink;ctx.lineWidth=2;ctx.lineCap="round";ctx.stroke();
    lastPos.current=pos;
  };
  const end=e=>{
    if(!drawing.current)return;
    drawing.current=false;
    onChange(ref.current.toDataURL());
  };
  const clear=()=>{
    if(locked)return;
    const c=ref.current;
    c.getContext("2d").clearRect(0,0,c.width,c.height);
    onChange("");
  };

  return(
    <div>
      {label&&<div style={{fontSize:9,letterSpacing:1.5,color:C.stone,marginBottom:4,fontFamily:T.sans}}>{label}</div>}
      <div style={{position:"relative",border:`1px dashed ${C.gold}`,borderRadius:3,background:"#FEFCF8",overflow:"hidden"}}>
        <canvas ref={ref} width={340} height={80}
          style={{display:"block",width:"100%",height:80,cursor:locked?"not-allowed":"crosshair",touchAction:"none"}}
          onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
        {!locked&&<button className="no-print" onClick={clear} style={{position:"absolute",top:4,right:4,background:"transparent",border:`1px solid ${C.border}`,borderRadius:2,padding:"2px 6px",fontSize:9,cursor:"pointer",color:C.stone,fontFamily:T.sans}}>Clear</button>}
      </div>
    </div>
  );
}

            {isCustom&&customObj&&!customObj.approved&&<span style={{background:"#FFF3E0",color:"#E65100",borderRadius:2,padding:"0 4px",fontSize:9,fontWeight:700,marginRight:4}}>PENDING</span>}
            {isRemoved&&<span style={{background:"#8B3A3A22",color:"#8B3A3A",border:"1px solid #8B3A3A44",borderRadius:2,padding:"0 5px",fontSize:9,fontWeight:700,marginLeft:4}}>REMOVED</span>}
            {item.desc}
          </div>
          {isVO&&isOn&&!isDupe&&!isCustom&&(
            <button onClick={e=>{e.stopPropagation();onRemove();}}
              style={{marginTop:3,background:isRemoved?"#8B3A3A":"transparent",color:isRemoved?"#fff":"#8B3A3A",border:"1px solid #8B3A3A66",borderRadius:2,padding:"2px 7px",fontSize:9,cursor:"pointer",fontFamily:T.sans,fontWeight:600}}>
              {isRemoved?"↩ Restore":"✕ Remove from scope"}
            </button>
          )}
          {isOn&&item.carpentry&&(
            <div style={{display:"flex",gap:3,marginTop:4,flexWrap:"wrap"}}>
              {Object.entries(FINISH).map(([k,v])=>(
                <button key={k} onClick={()=>onTier(k)}
                  style={{background:tier===k?C.ink:C.creamD,color:tier===k?C.gold:C.stone,border:`1px solid ${tier===k?C.gold:C.border}`,borderRadius:2,padding:"2px 6px",fontSize:9,cursor:"pointer",fontFamily:T.sans}}>
                  {v.label} ×{v.mult}
                </button>
              ))}
            </div>
          )}
          {isOn&&(
            <textarea
              placeholder="Notes to client..."
              value={note}
              onChange={e=>onNote(e.target.value)}
              rows={1}
              style={{width:"100%",marginTop:4,border:`1px solid ${C.border}`,borderRadius:2,padding:"4px 7px",fontSize:11,fontFamily:T.sans,background:"#FAFAF8",color:C.stone,boxSizing:"border-box",resize:"vertical",minHeight:28,lineHeight:1.5,display:"block"}}
            />
          )}
          {isCustom&&customObj&&!customObj.approved&&USER_ROLE>=ROLES.director&&(
            <button onClick={onApprove}
              style={{marginTop:3,background:C.gold,color:C.ink,border:"none",borderRadius:2,padding:"2px 8px",fontSize:9,cursor:"pointer",fontFamily:T.sans}}>Approve</button>
          )}
        </div>
        {/* QTY */}
        <div style={{textAlign:"right",paddingTop:2}}>
          {isOn?(()=>{
            const decUnits=["ft run","pfr","PFR","m run","sqft","sqm","M","Roll"];
            const allowDec=decUnits.includes(item.unit);
            return(
            <input type="text" inputMode={allowDec?"decimal":"numeric"} disabled={isLocked}
              value={qty===0?"":qty} placeholder="0"
              onChange={e=>{
                const v=e.target.value;
                if(allowDec){if(/^\d*\.?\d{0,1}$/.test(v)||v==="")onQtyChange(v);}
                else{onQtyChange(v.replace(/[^0-9]/g,""));}
              }}
              onBlur={e=>{
                const v=parseFloat(e.target.value)||0;
                onQtyBlur(allowDec?Math.round(v*2)/2:Math.round(v));
              }}
              style={{width:44,border:`1px solid ${C.border}`,borderRadius:3,padding:"3px 4px",fontSize:15,textAlign:"center",background:isLocked?"#F5F0E8":C.cream,fontFamily:T.sans}}
            />
            );
          })():<span style={{color:C.border,fontSize:10}}>—</span>}
        </div>
        {/* UNIT */}
        <div style={{fontSize:12,color:C.stone,textAlign:"right",paddingTop:4,fontFamily:T.sans,wordBreak:"break-word"}}>{item.unit}</div>
        {/* PRICE — POA: type freely; greyed + unprintable until senior/director approves */}
        <div style={{fontFamily:T.serif,fontSize:15,textAlign:"right",color:ep>0?C.ink:C.stone,paddingTop:4}}>
          {editRate?(
            /* Adjustable-rate trade (Miscellaneous): any designer may key the agreed rate.
               No approval gate — the card price is only a starting point. */
            <input type="text" inputMode="decimal" disabled={isLocked}
              value={poaVal!==undefined&&poaVal!==null&&poaVal!==""?poaVal:String(item.price)}
              onChange={e=>{const v=e.target.value;if(/^\d*\.?\d{0,2}$/.test(v)||v==="")onPoaChange(v);}}
              style={{width:74,border:`1px solid ${C.gold}`,borderRadius:3,padding:"3px 5px",fontSize:13,fontFamily:T.serif,textAlign:"right",background:C.cream,color:C.ink}}/>
          ):(item.poa||poaEdited||ep<=0)?(
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:1}}>
              <input type="text" inputMode="decimal" disabled={isLocked}
                value={poaVal!==undefined&&poaVal!==null?poaVal:""}
                placeholder="POA"
                onChange={e=>{const v=e.target.value;if(/^\d*\.?\d{0,2}$/.test(v)||v==="")onPoaChange(v);}}
                style={{width:74,border:`1px solid ${poaNeedsApp?C.stone:(poaApproved?C.success:C.gold)}`,borderRadius:3,padding:"3px 5px",fontSize:13,textAlign:"right",fontFamily:T.serif,background:poaNeedsApp?"#EDEAE5":C.cream,color:poaNeedsApp?C.stone:C.ink,opacity:poaNeedsApp?0.75:1}}/>
              {poaNeedsApp?(
                <span onClick={()=>!isLocked&&onPoaUnlock()} title="Needs senior/director approval to print"
                  style={{fontSize:8,color:C.stone,fontWeight:700,cursor:"pointer",textDecoration:"underline dotted"}}>⏳ approve to print</span>
              ):poaEdited?(
                <span style={{fontSize:8,color:C.success,fontWeight:700}}>✓ approved</span>
              ):null}
            </div>
          ):(
            ep>0?fmt(ep):<span style={{color:C.gold,fontSize:13}}>POA</span>
          )}
        </div>
        {/* IMG */}
        <div style={{textAlign:"right",paddingTop:2}}>
          {isOn&&(
            <div style={{display:"flex",alignItems:"center",justifyContent:"flex-end",gap:2}}>
              {img&&<img src={img} alt="" style={{width:20,height:20,objectFit:"cover",borderRadius:2,border:`1px solid ${C.border}`}}/>}
              <button onClick={onImg} style={{background:C.creamD,border:`1px solid ${C.border}`,borderRadius:2,padding:"2px 5px",fontSize:9,cursor:"pointer",color:img?C.success:C.stone,fontFamily:T.sans}}>{img?"✓":"IMG"}</button>
              {onDuplicate&&!isLocked&&<button onClick={e=>{e.stopPropagation();onDuplicate();}} title="Duplicate this line in the same zone" style={{background:C.creamD,border:`1px solid ${C.border}`,borderRadius:2,padding:"2px 5px",fontSize:9,cursor:"pointer",color:C.stone,fontFamily:T.sans}}>⧉</button>}
            </div>
          )}
        </div>
        {/* TOTAL */}
        <div style={{fontFamily:T.serif,fontSize:15,color:isOn&&qty>0?C.ink:C.border,textAlign:"right",paddingTop:4}}>{isOn&&qty>0?fmt(lineT):"—"}</div>
      </div>
    </div>
  );
});

function VersionManager({onOpen,onNew,onAdmin,onNewVO}){
  const[versions,setVersions]=useState(loadVersions);
  // ── TRASH (30-day retention) ──────────────────────────────────────────────
  // Nothing is destroyed on delete. Items move to Trash with a timestamp and can be
  // restored intact. Only a Director can purge early. Signed contracts cannot be trashed.
  const[showTrash,setShowTrash]=useState(false);
  const trashed=versions.filter(q=>q.deletedAt);
  const live=versions.filter(q=>!q.deletedAt);

  // DUPLICATE — works on ANY status (Draft, Sent, Signed). Always produces a brand-new
  // standalone Draft: fresh reference, no parent link, no signatures, no invoice number,
  // no director approval, no VO lineage. Use for the same project or a different one.
  const dup=q=>{
    const copy={...JSON.parse(JSON.stringify(q)),id:newId(),name:`${q.name} (Copy)`,status:"Draft",
      isVO:false,parentId:null,voNumber:0,voCount:0,parentRef:null,parentTotal:null,
      parentTotal_snapshot:null,voApproved:false,invNo:null,revised:false,deletedAt:undefined,
      createdAt:todayStr(),updatedAt:todayStr()};
    delete copy.deletedAt;
    copy.client={...copy.client,ref:genRef(),date:todayStr()};
    copy.sig={...(copy.sig||{}),clientName:"",agreed:false,
      summaryCanvas:"",tcCanvas:"",warrantyCanvas:"",allItemsCanvas:"",
      idCanvas:"",directorCanvas:"",clientCanvas:"",client2Canvas:"",client2Name:"",
      date:todayStr(),idDate:todayStr(),directorDate:todayStr()};
    Object.keys(copy.sig).forEach(k=>{if(k.startsWith("paid_"))delete copy.sig[k];});
    const v=[copy,...versions];setVersions(v);saveVersions(v);cloudPush(copy);
    alert(`Duplicated as a new Draft.\n\nA new reference number will be issued when you save it.`);
  };

  const trash=q=>{
    if(q.status==="Signed"){
      alert("This quote is SIGNED and cannot be deleted.\n\nA signed quote is an executed contract. To change it, raise a Variation Order.");
      return;
    }
    const kids=versions.filter(x=>x.parentId===q.id&&!x.deletedAt);
    const msg=kids.length
      ? `Move to Trash?\n\n${q.name}\nRef ${q.client?.ref||"—"}\n\nIts ${kids.length} Variation Order(s) will go with it, and come back together if restored.\n\nRecoverable for ${TRASH_DAYS} days.`
      : `Move to Trash?\n\n${q.name}\nRef ${q.client?.ref||"—"}\n\nRecoverable for ${TRASH_DAYS} days.`;
    if(!window.confirm(msg))return;
    const stamp=Date.now();
    const ids=new Set([q.id,...kids.map(k=>k.id)]);
    const upd=versions.map(x=>ids.has(x.id)?{...x,deletedAt:stamp}:x);
    setVersions(upd);saveVersions(upd);
    upd.filter(x=>ids.has(x.id)).forEach(cloudPush);
  };

  const restore=q=>{
    const kids=versions.filter(x=>x.parentId===q.id&&x.deletedAt===q.deletedAt);
    const ids=new Set([q.id,...kids.map(k=>k.id)]);
    const upd=versions.map(x=>{if(!ids.has(x.id))return x;const{deletedAt,...rest}=x;return rest;});
    setVersions(upd);saveVersions(upd);
    upd.filter(x=>ids.has(x.id)).forEach(cloudPush);
  };

  const purge=q=>{
    if(USER_ROLE<ROLES.director){alert("Only a Director can permanently delete.");return;}
    const pin=window.prompt("PERMANENT DELETE — this cannot be undone.\n\nEnter Director PIN:");
    if(pin===null)return;
    if(pin!==DIRECTOR_PIN){alert("Incorrect Director PIN. Nothing was deleted.");return;}
    const ref=q.client?.ref||"";
    const typed=window.prompt(`Type the reference to confirm permanent deletion:\n${ref}`);
    if(typed===null)return;
    if(typed.trim()!==ref){alert("Reference did not match. Nothing was deleted.");return;}
    const v=versions.filter(x=>x.id!==q.id);
    setVersions(v);saveVersions(v);cloudDelete(q.id);
  };

  const voBusy=useRef(false);
  const createVO=q=>{
    if(voBusy.current)return;              // guard: a second click before render can't fire again
    voBusy.current=true;
    setTimeout(()=>{voBusy.current=false;},1200);
    // Derive from the VOs that ACTUALLY exist — a stale voCount can no longer skew the number.
    const existing=versions.filter(x=>x.parentId===q.id).map(x=>Number(x.voNumber)||0);
    const voCount=(existing.length?Math.max(...existing):0)+1;
    const updParent={...q,voCount,parentTotal_snapshot:calcQuoteTotal(q)};
    const updated=versions.map(x=>x.id===q.id?updParent:x);
    saveVersions(updated);setVersions(updated);
    cloudPush(updParent);                  // was local-only — voCount never reached Supabase
    onNewVO(updParent);
  };
  const[search,setSearch]=useState("");
  // Owner filter. Everyone can still see every quote — this only narrows the view.
  const[owner,setOwner]=useState("all");
  const owners=useMemo(()=>{
    const set=new Set(live.map(q=>q.idStaff).filter(Boolean));
    return Array.from(set).sort();
  },[versions]);
  const countFor=n=>live.filter(q=>!q.isVO&&q.idStaff===n).length;
  const parents=live.filter(q=>!q.isVO).filter(q=>owner==="all"||q.idStaff===owner).filter(q=>{
    if(!search.trim())return true;
    const s=search.toLowerCase();
    return(q.name||"").toLowerCase().includes(s)||(q.client?.name||"").toLowerCase().includes(s)||(q.projectName||"").toLowerCase().includes(s)||(q.client?.ref||"").toLowerCase().includes(s)||(q.idStaff||"").toLowerCase().includes(s);
  });
  const vosOf=id=>live.filter(q=>q.parentId===id);
  return(
    <div style={{fontFamily:T.sans,background:C.cream,minHeight:"100vh"}}>
      <div style={{background:C.ink,padding:"18px 28px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontFamily:T.serif,fontSize:20,fontWeight:300,color:C.gold,letterSpacing:5}}>IKIGAI INTERIOR</div>
          <div style={{fontSize:9,color:C.stone,letterSpacing:3,marginTop:2}}>CODSTUDIO — QUOTATION BUILDER v6.5</div>
        </div>
        <div style={{display:"flex",gap:8}}>
          <span style={{fontSize:10,color:C.stone,fontFamily:T.sans,marginRight:4}}>{SESSION?SESSION.name:""}</span>
          <button onClick={()=>sb.auth.signOut().then(()=>window.location.reload())} style={{background:"transparent",border:`1px solid ${C.stone}44`,borderRadius:3,padding:"8px 12px",fontSize:10,cursor:"pointer",color:C.stone,fontFamily:T.sans}}>Sign out</button>
          <button onClick={()=>setShowTrash(t=>!t)} style={{background:showTrash?C.stone+"33":"transparent",border:`1px solid ${trashed.length?C.terra:C.stone+"44"}`,borderRadius:3,padding:"8px 14px",fontSize:10,cursor:"pointer",color:trashed.length?C.terra:C.stone,fontFamily:T.sans}}>
            🗑 Trash{trashed.length?` (${trashed.length})`:""}
          </button>
          {USER_ROLE>=ROLES.director&&<button onClick={onAdmin} style={{background:"transparent",border:`1px solid ${C.stone}44`,borderRadius:3,padding:"8px 14px",fontSize:10,cursor:"pointer",color:C.stone,fontFamily:T.sans}}>⚙ Admin</button>}
          <NewQuoteMenu onNew={onNew}/>
        </div>
      </div>
      <div style={{maxWidth:920,margin:"0 auto",padding:"28px 20px"}}>
        {showTrash&&(
          <div style={{background:C.white,border:`1px solid ${C.terra}44`,borderRadius:4,marginBottom:18,overflow:"hidden"}}>
            <div style={{padding:"14px 20px",background:"#FFF8F2",borderBottom:`1px solid ${C.terra}33`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontFamily:T.serif,fontSize:18,fontWeight:300,color:C.ink}}>Trash</div>
                <div style={{fontSize:11,color:C.stone,fontFamily:T.sans,marginTop:2}}>Items are kept for {TRASH_DAYS} days, then permanently removed. Restore anything at any time before then.</div>
              </div>
              <button onClick={()=>setShowTrash(false)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:3,padding:"6px 12px",fontSize:11,cursor:"pointer",color:C.stone,fontFamily:T.sans}}>Close</button>
            </div>
            {trashed.length===0?(
              <div style={{padding:"30px",textAlign:"center",fontSize:12,color:C.stone,fontFamily:T.sans}}>Trash is empty.</div>
            ):trashed.map(q=>{
              const d=daysLeft(q);
              const urgent=d!==null&&d<=7;
              return(
                <div key={q.id} style={{padding:"12px 20px",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
                  <div style={{flex:1,minWidth:180}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                      {q.isVO&&<span style={{background:C.terra,color:"#fff",borderRadius:3,padding:"1px 6px",fontSize:9,fontWeight:700}}>VO-{q.voNumber}</span>}
                      <span style={{fontFamily:T.serif,fontSize:15,fontWeight:300,color:C.stone}}>{q.name||"Untitled"}</span>
                    </div>
                    <div style={{fontSize:11,color:C.stone,fontFamily:T.sans,marginTop:2}}>{q.client?.ref||"—"} · {q.client?.name||"—"}</div>
                  </div>
                  <div style={{fontSize:11,fontFamily:T.sans,color:urgent?C.danger:C.stone,fontWeight:urgent?600:400,minWidth:110}}>
                    {d>0?`${d} day${d===1?"":"s"} left`:"purging soon"}
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={()=>restore(q)} style={{background:C.gold,color:C.ink,border:"none",borderRadius:3,padding:"6px 14px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:T.sans}}>↩ Restore</button>
                    {USER_ROLE>=ROLES.director&&(
                      <button onClick={()=>purge(q)} title="Permanently delete now — Director only" style={{background:"transparent",border:`1px solid ${C.danger}55`,borderRadius:3,padding:"6px 10px",fontSize:11,cursor:"pointer",color:C.danger,fontFamily:T.sans}}>Delete forever</button>
                    )}
                  </div>
                </div>
              );
            })}
          </div>
        )}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
          <div style={{fontFamily:T.serif,fontSize:22,fontWeight:300,color:C.ink}}>All Quotations</div>
          <input placeholder="Search by name, client, ref, designer…" value={search} onChange={e=>setSearch(e.target.value)}
            style={{border:`1px solid ${C.border}`,borderRadius:3,padding:"8px 14px",fontSize:12,fontFamily:T.sans,background:C.cream,color:C.ink,width:260,outline:"none"}}/>
        </div>
        {owners.length>0&&(
          <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:14,alignItems:"center"}}>
            <span style={{fontSize:9,letterSpacing:1.5,color:C.stone,fontWeight:700,fontFamily:T.sans,marginRight:5}}>DESIGNER</span>
            <button onClick={()=>setOwner("all")}
              style={{background:owner==="all"?C.ink:C.white,color:owner==="all"?C.gold:C.stone,border:`1px solid ${owner==="all"?C.gold:C.border}`,borderRadius:14,padding:"4px 13px",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:T.sans}}>
              All <span style={{opacity:.65}}>{live.filter(q=>!q.isVO).length}</span>
            </button>
            {owners.map(n=>{
              const on=owner===n;
              return(
                <button key={n} onClick={()=>setOwner(on?"all":n)}
                  style={{background:on?C.ink:C.white,color:on?C.gold:C.stone,border:`1px solid ${on?C.gold:C.border}`,borderRadius:14,padding:"4px 13px",fontSize:10,fontWeight:600,cursor:"pointer",fontFamily:T.sans}}>
                  {n} <span style={{opacity:.65}}>{countFor(n)}</span>
                </button>
              );
            })}
          </div>
        )}
        {parents.length===0?(
          <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:4,padding:"48px",textAlign:"center"}}>
            <div style={{fontFamily:T.serif,fontSize:18,fontWeight:300,color:C.stone,marginBottom:8}}>No quotes yet</div>
            <button onClick={()=>onNew("condo")} style={{background:C.gold,color:C.ink,border:"none",borderRadius:3,padding:"10px 22px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:T.sans}}>+ New Quote</button>
          </div>
        ):(
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {parents.map(q=>{
              const stCol=STATUS_COL[q.status]||C.stone;
              const vos=vosOf(q.id);
              return(
                <div key={q.id}>
                  <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:4,padding:"16px 20px",display:"flex",alignItems:"center",gap:16}}>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4,flexWrap:"wrap"}}>
                        <span style={{fontFamily:T.serif,fontSize:17,fontWeight:300,color:C.ink}}>{q.name||"Untitled"}</span>
                        {q.projectName&&<span style={{fontSize:11,color:C.stone}}>— {q.projectName}</span>}
                        <span style={{background:stCol+"22",border:`1px solid ${stCol}`,color:stCol,borderRadius:3,padding:"1px 8px",fontSize:9,fontWeight:600,letterSpacing:1}}>{q.status}</span>
                        {vos.length>0&&<span style={{background:C.terraPale,color:C.terra,borderRadius:3,padding:"1px 7px",fontSize:9,fontWeight:600}}>{vos.length} VO{vos.length>1?"s":""}</span>}
                      </div>

function AdminPanel({onBack}){
  const auth=USER_ROLE>=ROLES.director;   // gated on Microsoft login role — no PIN
  const[trades,setTrades]=useState(loadTrades);
  const[editId,setEditId]=useState(null);
  const[editBuf,setEditBuf]=useState({});
  const[csvMsg,setCsvMsg]=useState("");
  const fileRef=useRef(null);

  const startEdit=(item)=>{setEditId(item.id);setEditBuf({desc:item.desc,price:String(item.price),unit:item.unit});};
  const saveEdit=()=>{
    const fields={desc:editBuf.desc,price:parseFloat(editBuf.price)||0,unit:editBuf.unit};
    saveTradeOverride(editId,fields);
    setTrades(prev=>prev.map(t=>({...t,items:t.items.map(i=>i.id===editId?{...i,...fields}:i)})));
    setEditId(null);
  };

  const handleCsv=e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const text=ev.target.result;
        const rows=text.split("\n").map(r=>r.split(",").map(c=>c.trim().replace(/^"|"$/g,"")));
        const header=rows[0].map(h=>h.toLowerCase());
        const idIdx=header.indexOf("id"),descIdx=header.indexOf("desc"),priceIdx=header.indexOf("price"),unitIdx=header.indexOf("unit");
        if(idIdx<0||descIdx<0||priceIdx<0)throw new Error("CSV must have columns: id, desc, price, unit");
        let count=0;
        rows.slice(1).forEach(row=>{
          if(!row[idIdx])return;
          const fields={};
          if(descIdx>=0&&row[descIdx])fields.desc=row[descIdx];
          if(priceIdx>=0&&row[priceIdx])fields.price=parseFloat(row[priceIdx])||0;
          if(unitIdx>=0&&row[unitIdx])fields.unit=row[unitIdx];
          saveTradeOverride(row[idIdx],fields);count++;
        });
        setTrades(loadTrades());
        setCsvMsg(`✓ ${count} items updated from CSV`);
      }catch(err){setCsvMsg("✕ Error: "+err.message);}
    };
    reader.readAsText(f);
  };

  if(!auth)return(
    <div style={{background:C.cream,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:T.sans}}>
      <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:4,padding:"40px",width:340,textAlign:"center"}}>
        <div style={{fontFamily:T.serif,fontSize:20,fontWeight:300,color:C.ink,marginBottom:6}}>Admin Access</div>
        <div style={{fontSize:11,color:C.stone,marginBottom:20,lineHeight:1.6}}>
          Restricted to Directors.<br/>Your account is signed in as <strong style={{color:C.ink}}>{(SESSION&&SESSION.name)||"—"}</strong>.
        </div>
        <button onClick={onBack} style={{width:"100%",background:C.gold,color:C.ink,border:"none",borderRadius:3,padding:"10px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:T.sans}}>← Back to Quotations</button>
      </div>
    </div>
  );

  return(
    <div style={{background:C.cream,minHeight:"100vh",fontFamily:T.sans}}>
      <div style={{background:C.ink,padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontFamily:T.serif,fontSize:16,color:C.gold,letterSpacing:3}}>CODSTUDIO ADMIN</div>
          <div style={{fontSize:9,color:C.stone,letterSpacing:2}}>RATE CARD EDITOR — DIRECTOR ONLY</div>
        </div>
        <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.stone}44`,borderRadius:3,padding:"6px 12px",fontSize:10,cursor:"pointer",color:C.stone}}>← Dashboard</button>
      </div>
      <div style={{maxWidth:1000,margin:"0 auto",padding:"24px 20px"}}>
        {/* BULK CSV */}
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:4,padding:"20px",marginBottom:16}}>
          <div style={{fontFamily:T.serif,fontSize:17,fontWeight:300,marginBottom:4}}>Bulk Upload via CSV</div>
          <div style={{fontSize:11,color:C.stone,marginBottom:12}}>CSV must have columns: <strong>id, desc, price, unit</strong> (header row required). Item IDs must match existing rate card IDs (e.g. 4.1, 9.13).</div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <input ref={fileRef} type="file" accept=".csv" onChange={handleCsv} style={{display:"none"}}/>
            <button onClick={()=>fileRef.current?.click()} style={{background:C.gold,color:C.ink,border:"none",borderRadius:3,padding:"8px 16px",fontSize:11,cursor:"pointer",fontFamily:T.sans,fontWeight:600}}>Choose CSV File</button>
            {csvMsg&&<span style={{fontSize:11,color:csvMsg.startsWith("✓")?C.success:C.danger}}>{csvMsg}</span>}
          </div>
        </div>
        {/* INLINE EDITOR */}
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:4,overflow:"hidden"}}>
          <div style={{padding:"14px 20px",fontFamily:T.serif,fontSize:17,fontWeight:300,borderBottom:`1px solid ${C.border}`}}>Inline Item Editor</div>
          <div style={{display:"grid",gridTemplateColumns:"60px 1fr 80px 70px 80px",gap:0,background:C.creamD,padding:"6px 16px"}}>
            {["ID","DESCRIPTION","PRICE","UNIT",""].map((h,i)=><div key={i} style={{fontSize:9,fontWeight:600,letterSpacing:1,color:C.stone}}>{h}</div>)}
          </div>
          <div style={{maxHeight:"60vh",overflowY:"auto"}}>
            {trades.map(trade=>(
              <div key={trade.id}>
                <div style={{padding:"8px 16px",background:C.creamD,borderTop:`1px solid ${C.border}`,fontFamily:T.sans,fontSize:10,fontWeight:600,letterSpacing:1,color:C.stone}}>{trade.code} — {trade.name}</div>
                {trade.items.map(item=>(
                  <div key={item.id} style={{display:"grid",gridTemplateColumns:"60px 1fr 80px 70px 80px",gap:0,padding:"6px 16px",borderBottom:`1px solid #F5F0E8`,alignItems:"center",background:editId===item.id?"#FFFDF5":"#fff"}}>
                    <div style={{fontSize:10,color:C.stone,fontFamily:T.sans}}>{item.id}</div>
                    {editId===item.id?(
                      <>
                        <input value={editBuf.desc} onChange={e=>setEditBuf(b=>({...b,desc:e.target.value}))} style={{border:`1px solid ${C.gold}`,borderRadius:2,padding:"3px 6px",fontSize:11,fontFamily:T.sans,marginRight:6}}/>
                        <input value={editBuf.price} onChange={e=>setEditBuf(b=>({...b,price:e.target.value}))} style={{border:`1px solid ${C.gold}`,borderRadius:2,padding:"3px 6px",fontSize:11,fontFamily:T.sans,width:70,marginRight:6}}/>
                        <input value={editBuf.unit} onChange={e=>setEditBuf(b=>({...b,unit:e.target.value}))} style={{border:`1px solid ${C.gold}`,borderRadius:2,padding:"3px 6px",fontSize:11,fontFamily:T.sans,width:60,marginRight:6}}/>
                        <div style={{display:"flex",gap:4}}>
                          <button onClick={saveEdit} style={{background:C.gold,color:C.ink,border:"none",borderRadius:2,padding:"3px 8px",fontSize:9,cursor:"pointer",fontFamily:T.sans}}>Save</button>
                          <button onClick={()=>setEditId(null)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:2,padding:"3px 6px",fontSize:9,cursor:"pointer",color:C.stone}}>✕</button>
                        </div>
                      </>
                    ):(
                      <>
                        <div style={{fontSize:11,color:C.ink,fontFamily:T.sans,paddingRight:8}}>{item.desc}</div>
                        <div style={{fontSize:11,fontFamily:T.serif,color:C.stone}}>{item.price>0?fmt(item.price):"POA"}</div>
                        <div style={{fontSize:10,color:C.stone,fontFamily:T.sans}}>{item.unit}</div>
                        <button onClick={()=>startEdit(item)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:2,padding:"3px 8px",fontSize:9,cursor:"pointer",color:C.stone,fontFamily:T.sans}}>Edit</button>
                      </>
                    )}
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

  const[tiers,setTiers]=useState(initData.tiers||{});
  const[notes,setNotes]=useState(initData.notes||{});
  const[imgs,setImgs]=useState({});
  const[zoneOverride,setZoneOverride]=useState(initData.zoneOverride||{});
  const[dupes,setDupes]=useState(initData.dupes||[]);
  const[openTrades,setOpenTrades]=useState(initData.openTrades||{1:true});
  const[openZones,setOpenZones]=useState(initData.openZones||{});
  const[payKey,setPayKey]=useState(initData.payKey||"standard");
  const[customPay,setCustomPay]=useState(initData.customPay||[]);
  const[showCPay,setShowCPay]=useState(false);
  const[disc,setDisc]=useState(initData.disc||"");
  const[discOk,setDiscOk]=useState(initData.discOk||false);
  const[usePaypal,setUsePaypal]=useState(initData.usePaypal||false);
  const[usePaynow,setUsePaynow]=useState(initData.usePaynow||false);
  const[customs,setCustoms]=useState(initData.customs||[]);
  const[removalOn,setRemovalOn]=useState(initData.removalOn||{});
  // ── VO STATE — freehand additions & omissions. Parent is never touched.
  const[voAdds,setVoAdds]=useState(initData.voAdds||[]);
  const[voOmits,setVoOmits]=useState(initData.voOmits||[]);
  const[voApproved,setVoApproved]=useState(initData.voApproved||false);
  const[voPinBuf,setVoPinBuf]=useState("");
  const[showVoPin,setShowVoPin]=useState(false);
  const parentRef=initData.parentRef||null;
  const parentTotal=initData.parentTotal??null;
  const voBlank=()=>({id:`v${Date.now()}${Math.random().toString(36).slice(2,5)}`,desc:"",qty:"1",unit:"LS",rate:""});
  const voLineAmt=l=>(parseFloat(l.qty)||0)*(parseFloat(l.rate)||0);
  const voAddSub=useMemo(()=>voAdds.reduce((a,l)=>a+voLineAmt(l),0),[voAdds]);
  const voOmitSub=useMemo(()=>voOmits.reduce((a,l)=>a+voLineAmt(l),0),[voOmits]);
  const voNet=voAddSub-voOmitSub;
  const[customForm,setCustomForm]=useState(null);
  const[sig,setSig]=useState(initData.sig||{clientName:"",date:"",agreed:false,directorDate:"",idDate:"",summaryCanvas:"",tcCanvas:"",warrantyCanvas:""});
  const[showEmail,setShowEmail]=useState(false);
  const[showFullPrintPin,setShowFullPrintPin]=useState(false);
  const[printPin,setPrintPin]=useState("");
  const[poaPrices,setPoaPricesRaw]=useState(initData.poaPrices||{});
  const setPoaPrices=(...a)=>{markRevised();setPoaPricesRaw(...a);};
  const[poaUnlocked,setPoaUnlocked]=useState(true);// POA fields are always editable now; approval is the gate
  const[poaApproved,setPoaApproved]=useState(initData.poaApproved||{});// {itemId:true} once senior/director approves
  const[poaPinPrompt,setPoaPinPrompt]=useState(null);
  const[poaPinBuf,setPoaPinBuf]=useState("");
  const[extraZones,setExtraZones]=useState(initData.extraZones||[]);
  const[shownZones,setShownZones]=useState(initData.shownZones||{});// {"tid-zone":true} force-render empty zones
  const[zoneNames,setZoneNames]=useState(initData.zoneNames||{});
  const[editingZone,setEditingZone]=useState(null);
  const[zoneNameBuf,setZoneNameBuf]=useState("");
  const[itemSeq,setItemSeq]=useState(initData.itemSeq||{});
  const[pendingApprovals,setPendingApprovals]=useState(initData.pendingApprovals||[]);
  // Push a gated action to the dashboard queue for a director to approve later.
  const pushToDashboard=(kind,detail)=>{
    setPendingApprovals(p=>[...p,{id:`ap-${Date.now()}${Math.random().toString(36).slice(2,6)}`,kind,detail,ref:client.ref||"—",by:idStaff||"staff",at:todayStr(),status:"pending"}]);
    setPoaPinPrompt(null);
    alert("Sent to dashboard for director approval. It will appear in the approvals queue.");
  };
  // Reorder an item within its zone list: dir=-1 up, +1 down.
  const moveInZone=(list,id,dir)=>{
    const ids=list.map(x=>x.id);const idx=ids.indexOf(id);const j=idx+dir;
    if(idx<0||j<0||j>=ids.length)return;
    const seq={};ids.forEach((x,k)=>{seq[x]=k;});
    const tmp=seq[ids[idx]];seq[ids[idx]]=seq[ids[j]];seq[ids[j]]=tmp;
    setItemSeq(s=>({...s,...seq}));
  };
  const seqSort=arr=>[...arr].sort((a,b)=>{const sa=itemSeq[a.id],sb=itemSeq[b.id];if(sa===undefined&&sb===undefined)return 0;if(sa===undefined)return 1;if(sb===undefined)return -1;return sa-sb;});
  const[movePicker,setMovePicker]=useState(null);// {id, tradeId, current}
  // Move an item to another zone within the same trade (trade-wide movement).
  const moveItemToZone=(item,targetZone)=>{
    if(item.srcId){/* dupe: update its zone in dupes */setDupes(d=>d.map(x=>x.id===item.id?{...x,zone:targetZone}:x));}
    else{setZoneOverride(o=>({...o,[item.id]:targetZone}));}
    setMovePicker(null);
  };
  // zoneList = default zones + any custom-added zones (for dropdowns & iteration)
  const zoneList=useMemo(()=>{const base=PTC.zones;return[...base,...extraZones.filter(z=>!base.includes(z))];},[extraZones,projectType]);
  const zoneLabel=(tid,z)=>zoneNames[`${tid}-${z}`]||z;
  const addZone=(tid)=>{const name=window.prompt("New zone name:");if(!name||!name.trim())return;const nm=name.trim();setExtraZones(list=>list.includes(nm)?list:[...list,nm]);setShownZones(s=>({...s,[`${tid}-${nm}`]:true}));setOpenZones(o=>({...o,[`${tid}-${nm}`]:true}));};
  const[dragId,setDragId]=useState(null);
  const[dragTarget,setDragTarget]=useState(null);
  const dragIdRef=useRef(null);
  const dragTargetRef=useRef(null);
  const[topbarH,setTopbarH]=useState(52);
  // Topbar wraps at narrow widths, so its height is not fixed. Measure it and keep the
  // trade nav pinned directly beneath — otherwise the nav slides under the bar and vanishes.
  useEffect(()=>{
    const measure=()=>{const el=document.querySelector(".codstudio-topbar");if(el)setTopbarH(el.offsetHeight);};
    measure();
    window.addEventListener("resize",measure);
    const t=setTimeout(measure,300);
    return()=>{window.removeEventListener("resize",measure);clearTimeout(t);};
  },[]);
  // AUTO-SCROLL while dragging: when a native drag hovers near the top/bottom edge of the
  // viewport, gently scroll the page so off-screen zones become reachable as drop targets.
  useEffect(()=>{
    let raf=null,vy=0;
    const EDGE=90,MAX=22;// px trigger band, max scroll speed
    const tick=()=>{ if(vy!==0){window.scrollBy(0,vy);raf=requestAnimationFrame(tick);} else{raf=null;} };
    const onDragOver=e=>{
      if(!dragMeta.current){vy=0;return;}
      const y=e.clientY,h=window.innerHeight;
      if(y<EDGE){vy=-Math.ceil((EDGE-y)/EDGE*MAX);}
      else if(y>h-EDGE){vy=Math.ceil((y-(h-EDGE))/EDGE*MAX);}
      else{vy=0;}
      if(vy!==0&&raf===null){raf=requestAnimationFrame(tick);}
    };
    const stop=()=>{vy=0;if(raf){cancelAnimationFrame(raf);raf=null;}};
    document.addEventListener("dragover",onDragOver);
    document.addEventListener("drop",stop);
    document.addEventListener("dragend",stop);
    return()=>{document.removeEventListener("dragover",onDragOver);document.removeEventListener("drop",stop);document.removeEventListener("dragend",stop);stop();};
  },[]);
  useEffect(()=>{
    const measure=()=>{const el=document.querySelector(".codstudio-topbar");if(el)setTopbarH(el.offsetHeight);};
    measure();window.addEventListener("resize",measure);
    const t=setTimeout(measure,300);
    return()=>{window.removeEventListener("resize",measure);clearTimeout(t);};
  },[]);
  const imgRefs=useRef({});
  const saveTimerRef=useRef(null);

  // Sent is a negotiating document — still editable. Signed is an executed contract — frozen.
  const isLocked=status==="Signed";
  const isFullyLocked=status==="Signed";
  // If a Sent quote is edited, it must not silently diverge from the copy the client holds.
  // Any change reverts it to Draft and flags it for re-issue, so the status can never lie.
  const[revised,setRevised]=useState(initData.revised||false);
  const sentRef=useRef(status);
  useEffect(()=>{sentRef.current=status;},[status]);
  const markRevised=useCallback(()=>{
    if(sentRef.current==="Sent"){setStatus("Draft");setRevised(true);}
  },[]);
  const gst=ent.gst;
  const isOn=id=>itemOn[id]===true;
  const getZone=item=>zoneOverride[item.id]||item.zone||"Whole House";
  const getTier=id=>tiers[id]||"base";
  const getEP=item=>{const manual=poaPrices[item.id];if(manual!==undefined&&manual!==null&&manual!=="")return parseFloat(manual)||0;const t=getTier(item.id);if(!item.carpentry||t==="base")return item.price;return Math.round(item.price*FINISH[t].mult*100)/100;};
  const isPoaEdited=id=>{const v=poaPrices[id];return v!==undefined&&v!==null&&v!=="";};
  const isPoaApproved=id=>poaApproved[id]===true;
  // Trades flagged editRate (Miscellaneous) are freely adjustable by any designer —
  // a keyed rate there is NOT a POA and never needs approval.
  const FREE_RATE_IDS=useMemo(()=>{const set=new Set();TRADES.filter(t=>t.editRate).forEach(t=>t.items.forEach(i=>set.add(i.id)));return set;},[]);
  // A line needs approval if it has a manually-keyed POA price that is not yet approved.
  const poaNeedsApproval=id=>!FREE_RATE_IDS.has(id)&&isPoaEdited(id)&&!isPoaApproved(id);
  const approvePoaPin=()=>{if(poaPinBuf===DIRECTOR_PIN){if(poaPinPrompt)setPoaApproved(a=>({...a,[poaPinPrompt]:true}));setPoaPinBuf("");setPoaPinPrompt(null);}else{alert("Incorrect Director PIN");}};
  const requestPoaApproval=id=>setPoaPinPrompt(id);
  const tryPoaPin=()=>{if(poaPinBuf===DIRECTOR_PIN){setPoaUnlocked(true);setPoaPinBuf("");}else{alert("Incorrect Director PIN");}};
  const zK=(tid,z)=>`${tid}-${z}`;
  const isZO=(tid,z)=>openZones[zK(tid,z)]!==false;

  // Auto-save debounced
  useEffect(()=>{
    if(isDraftRef(client.ref))return;   // unsaved draft — do not autosave until Save is pressed
    clearTimeout(saveTimerRef.current);
    saveTimerRef.current=setTimeout(()=>{
      const data=buildSaveData();
      onSave(data);
    },1500);
    return()=>clearTimeout(saveTimerRef.current);
  },[quoteName,projectName,entity,client,idStaff,status,projectType,unitSqft,designOn,qtys,itemOn,tiers,notes,zoneOverride,dupes,customs,openTrades,openZones,payKey,customPay,disc,discOk,usePaypal,sig,voAdds,voOmits,voApproved]);

  const buildSaveData=()=>({
    invNo,
    id:initData.id,name:quoteName,projectName,updatedAt:todayStr(),createdAt:initData.createdAt||todayStr(),
    entity,status,projectType,unitSqft,designOn,client,idStaff,qtys,itemOn,tiers,notes,zoneOverride,dupes,customs,removalOn,
    isVO,voNumber,parentId:initData.parentId||null,parentRef,parentTotal,voAdds,voOmits,voApproved,revised,
    openTrades,openZones,payKey,customPay,disc,discOk,usePaypal,usePaynow,sig,poaPrices,extraZones,shownZones,zoneNames,itemSeq,pendingApprovals,poaApproved
  });
  const[issuing,setIssuing]=useState(false);
  const handleSave=async()=>{
    let c=client;
    if(isDraftRef(client.ref)&&!issuing){
      setIssuing(true);
      const r=await issueRef(entity);
      setIssuing(false);
      if(r){c={...client,ref:r};setClient(c);}
      else{alert("Could not reach the server to issue a reference number. Check your connection and try again.");return;}
    }
    onSave({...buildSaveData(),client:c});
  };

  const handleImg=(id,e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setImgs(i=>({...i,[id]:ev.target.result}));r.readAsDataURL(f);};

  // Trade/zone logic
  const tradeIDs=t=>[...t.items.map(i=>i.id),...dupes.filter(d=>d.tradeId===t.id).map(d=>d.id),...customs.filter(c=>c.tradeId===t.id).map(c=>c.id)];
  const zoneIDs=(t,z)=>[...t.items.filter(i=>getZone(i)===z).map(i=>i.id),...dupes.filter(d=>d.tradeId===t.id&&d.zone===z).map(d=>d.id),...customs.filter(c=>c.tradeId===t.id&&c.zone===z).map(c=>c.id)];
  const tradeOn=t=>tradeIDs(t).some(id=>itemOn[id]===true);
  const zoneOn=(t,z)=>zoneIDs(t,z).some(id=>itemOn[id]===true);
  // OPTION A: trade/zone toggles now EXPAND to browse — they NEVER mass-select items.
  // Item selection is manual, per line. The toggle still shows "on" when any line inside
  // is selected (read via tradeOn/zoneOn), but clicking it only opens/closes the section.
  // Master trade toggle: ON switches every line in the trade on, OFF switches every line off.
  // Individual line toggles remain fully independent.
  const toggleTM=t=>{
    markRevised();
    const turnOn=!tradeOn(t);
    const ids=tradeIDs(t);
    setItemOn(o=>{const n={...o};ids.forEach(id=>{n[id]=turnOn;});return n;});
    if(turnOn){
      setOpenTrades(o=>({...o,[t.id]:true}));
      if(!t.noZone){
        setOpenZones(o=>{const n={...o};[...t.items,...dupes.filter(d=>d.tradeId===t.id)].forEach(i=>{n[zK(t.id,getZone(i))]=true;});return n;});
      }
    }
  };
  const toggleZM=(t,z)=>{
    const isOpen=isZO(t.id,z);
    setOpenTrades(o=>({...o,[t.id]:true}));
    setOpenZones(o=>({...o,[zK(t.id,z)]:!isOpen}));
  };
  const toggleItem=(id,tradeId,zone)=>{
    markRevised();
    const nowOn=!isOn(id);setItemOn(o=>({...o,[id]:nowOn}));
    if(nowOn){setOpenTrades(o=>({...o,[tradeId]:true}));setOpenZones(o=>({...o,[zK(tradeId,zone)]:true}));}
  };

  // Drag via pointer events — driven by refs so handlers always read live drag state
  // (React state closures are stale inside a captured pointer session; refs fix that).
  // NATIVE HTML5 drag-and-drop — reliable across browsers, no pointer-capture / hit-test issues.
  // The ⠿ handle sets draggable on its row; each zone is a drop target (see data-zone divs).
  const commitMove=(itemId,isDupe,srcTradeId,targetTradeId,targetZone)=>{
    if(srcTradeId!==targetTradeId)return;// only within same trade
    if(isDupe){setDupes(d=>d.map(x=>x.id===itemId?{...x,zone:targetZone}:x));}
    else{setZoneOverride(o=>({...o,[itemId]:targetZone}));}
    flashMoved(itemId);
  };
  const dragMeta=useRef(null);// {itemId,isDupe,tradeId}
  const[justMoved,setJustMoved]=useState(null);// itemId flashed gold ~2s after a drop
  const flashMoved=id=>{setJustMoved(id);setTimeout(()=>setJustMoved(m=>m===id?null:m),2000);};
  // Duplicate a line within the same zone (e.g. two wardrobes). Creates a dupe, turns it on, flashes it.
  const duplicateLine=(item,trade,zone)=>{
    if(isLocked)return;
    const nid=`dupe-${item.id}-${Date.now()}${Math.random().toString(36).slice(2,6)}`;
    setDupes(d=>[...d,{id:nid,srcId:item.srcId||item.id,tradeId:trade.id,zone,desc:item.desc,unit:item.unit,price:item.srcId?item.price:getEP(item),carpentry:item.carpentry,addon:item.addon,poa:item.poa}]);
    setItemOn(o=>({...o,[nid]:true}));
    setQtys(q=>({...q,[nid]:parseFloat(qtys[item.id])||1}));
    setOpenTrades(o=>({...o,[trade.id]:true}));setOpenZones(o=>({...o,[zK(trade.id,zone)]:true}));
    flashMoved(nid);
  };
  const pointerDragHandlers=(item,trade)=>{
    if(trade.noZone||!isOn(item.id)||isLocked)return{};
    return{
      draggable:true,
      onDragStart:e=>{
        dragMeta.current={itemId:item.id,isDupe:!!item.srcId,tradeId:trade.id};
        setDragId(item.id);
        try{e.dataTransfer.effectAllowed="move";e.dataTransfer.setData("text/plain",item.id);}catch(_){}
      },
      onDragEnd:()=>{dragMeta.current=null;setDragId(null);setDragTarget(null);},
    };
  };
  // Drop-target handlers applied to each zone container.
  const zoneDropHandlers=(trade,zone)=>({
    onDragOver:e=>{
      if(!dragMeta.current||dragMeta.current.tradeId!==trade.id)return;
      e.preventDefault();try{e.dataTransfer.dropEffect="move";}catch(_){}
      if(!(dragTarget&&dragTarget.tradeId===trade.id&&dragTarget.zone===zone))setDragTarget({tradeId:trade.id,zone});
    },
    onDrop:e=>{
      e.preventDefault();
      const m=dragMeta.current;
      if(m&&m.tradeId===trade.id){const srcZ=getZone({id:m.itemId,srcId:m.isDupe?m.itemId:undefined});commitMove(m.itemId,m.isDupe,m.tradeId,trade.id,zone);}
      dragMeta.current=null;setDragId(null);setDragTarget(null);
    },
  });

  // Subtotals
  const tradeSubs=useMemo(()=>TRADES.map(t=>{
    // Unapproved POA lines are pending — excluded from totals until a senior/director approves.
    const base=t.items.reduce((s,i)=>isOn(i.id)&&!poaNeedsApproval(i.id)?s+(parseFloat(qtys[i.id])||0)*getEP(i):s,0);
    const dp=dupes.filter(d=>d.tradeId===t.id).reduce((s,d)=>isOn(d.id)&&!poaNeedsApproval(d.id)?s+(parseFloat(qtys[d.id])||0)*d.price:s,0);
    const cu=t.id===1?0:customs.filter(c=>c.tradeId===t.id&&c.approved).reduce((s,c)=>isOn(c.id)?s+(parseFloat(qtys[c.id])||1)*c.price:s,0);
    const removal=isVO?t.items.reduce((s,i)=>removalOn[i.id]&&isOn(i.id)?s-((parseFloat(qtys[i.id])||0)*getEP(i)):s,0):0;
    return{id:t.id,code:t.code,name:t.name,sub:base+dp+cu+removal};
  }),[qtys,itemOn,tiers,dupes,customs,removalOn,poaPrices,poaApproved]);

  const getDesignPrice=item=>{
    if(item.fixedPrice!==null)return item.fixedPrice;
    if(item.basis==="raw")return Math.round(unitSqft*(item.psfPct||0));
    return Math.round(unitSqft*DESIGN_PSF_RATE*(item.psfPct||0));
  };
  const designCustoms=useMemo(()=>customs.filter(c=>c.tradeId===1),[customs]);
  const designCustomSub=useMemo(()=>designCustoms.filter(c=>c.approved&&isOn(c.id)).reduce((s,c)=>s+(parseFloat(qtys[c.id])||1)*c.price,0),[designCustoms,itemOn,qtys]);
  const designSubtotal=useMemo(()=>DESIGN_ITEMS_CFG.reduce((s,item)=>designOn[item.id]?s+getDesignPrice(item):s,0)+designCustomSub,[designOn,unitSqft,projectType,designCustomSub]);
  const subtotal=isVO?voNet:(designSubtotal+tradeSubs.reduce((s,t)=>s+t.sub,0));
  const discAmt=discOk?(parseFloat(disc)||0):0;
  const afterDisc=subtotal-discAmt;
  const gstAmt=gst?afterDisc*0.09:0;
  const total=afterDisc+gstAmt;
  const paypalFee=usePaypal?total*0.035:0;
  const grandTotal=total+paypalFee;
  const activePayItems=useMemo(()=>payKey==="custom"?customPay:PAY_PRESETS[payKey]?.items||[],[payKey,customPay]);
  const cpTotal=customPay.reduce((s,p)=>s+(parseFloat(p.pct)||0),0);

  const saveCustom=()=>{
    if(!customForm?.desc||!customForm?.price)return;
    const id=`c${Date.now()}${Math.random().toString(36).slice(2,6)}`;
    const capDesc=customForm.desc.charAt(0).toUpperCase()+customForm.desc.slice(1);
    setCustoms(c=>[...c,{id,tradeId:customForm.tradeId,zone:customForm.zone||"Whole House",desc:capDesc,unit:customForm.unit||"LS",price:parseFloat(customForm.price)||0,approved:false}]);
    setCustomForm(null);

  // Shared UI helpers
  const Btn=({ch,onClick,bg=C.gold,col=C.ink,sm,dis})=><button onClick={onClick} disabled={dis} style={{background:dis?C.creamD:bg,color:dis?C.stone:col,border:"none",borderRadius:3,padding:sm?"5px 10px":"8px 16px",fontSize:sm?9:11,fontWeight:600,cursor:dis?"not-allowed":"pointer",fontFamily:T.sans,opacity:dis?0.6:1}}>{ch}</button>;
  const OBtn=({ch,onClick,col=C.stone,sm})=><button onClick={onClick} style={{background:"transparent",color:col,border:`1px solid ${col}`,borderRadius:3,padding:sm?"5px 10px":"8px 16px",fontSize:sm?9:11,fontWeight:600,cursor:"pointer",fontFamily:T.sans}}>{ch}</button>;
  const sL={fontFamily:T.sans,fontSize:10,fontWeight:600,letterSpacing:1.5,color:C.stone,textTransform:"uppercase",display:"block",marginBottom:5};
  const card={background:C.white,borderRadius:4,border:`1px solid ${C.border}`,marginBottom:10,overflow:"hidden"};
  const inp=(k,lbl,ph)=>(
    <div>
      <label style={sL}>{lbl}</label>
      <input style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:3,padding:"8px 11px",fontSize:13,fontFamily:T.sans,background:C.cream,color:C.ink,boxSizing:"border-box"}}
        placeholder={ph} value={client[k]||""} onChange={e=>setClient(c=>({...c,[k]:e.target.value}))}/>
    </div>
  );

  // Print — both buttons (and the browser's own Cmd+P) just call window.print().
  // The .print-section quote document is the print surface; the handlers below flag it.
  // Print scope: pre-signing only the Summary page may print freely.
  // Full (all pages) needs Director PIN — unless status is Signed, then it is free.
  const printScopeRef=useRef("full");
  const runPrint=scope=>{printScopeRef.current=scope;window.print();};
  const doPrintSummary=()=>{runPrint("summary");};
  // Full print is unlocked — this IS how quotes are issued to clients.
  const doFullPrint=()=>{runPrint("full");};
  // Reliable cross-browser print filtering: `beforeprint` fires for window.print()
  // AND native Ctrl/Cmd+P. We flag <body class="printing"> so CSS reveals only the
  // selected-items .print-section document and hides the live edit page; `afterprint`
  // removes the flag, restoring the page exactly to its prior edit state.
  useEffect(()=>{
    const before=()=>{document.body.classList.add("printing");
      if(printScopeRef.current==="summary")document.body.classList.add("summary-only");
      else document.body.classList.remove("summary-only");};
    const after=()=>{document.body.classList.remove("printing");document.body.classList.remove("summary-only");};
    window.addEventListener("beforeprint",before);
    window.addEventListener("afterprint",after);
    return()=>{
      window.removeEventListener("beforeprint",before);
      window.removeEventListener("afterprint",after);
      document.body.classList.remove("printing");
    };
  },[]);

  // Sign document
  const signedAll=sig.summaryCanvas&&sig.tcCanvas&&sig.warrantyCanvas&&sig.clientName&&sig.agreed;

  return(
    <div style={{fontFamily:T.sans,background:C.cream,minHeight:"100vh",color:C.ink}}>
      {/* TOPBAR */}
      <div className="no-print codstudio-topbar" style={{background:C.ink,padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:6,position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button onClick={()=>{handleSave();onBack();}} style={{background:"transparent",border:`1px solid ${C.stone}44`,borderRadius:3,padding:"5px 10px",fontSize:10,cursor:"pointer",color:C.stone,fontFamily:T.sans}}>← All</button>
          <div>
            <input value={quoteName} onChange={e=>setQuoteName(e.target.value)}
              style={{fontFamily:T.serif,fontSize:16,fontWeight:300,color:C.gold,background:"transparent",border:"none",outline:"none",letterSpacing:1,width:180}}/>
            {projectName&&<span style={{fontSize:11,color:C.stone,marginLeft:6}}>· {projectName}</span>}
            <div style={{display:"flex",alignItems:"center",gap:6,marginTop:1}}>
              {isVO&&<span style={{background:C.terra,color:"#fff",borderRadius:3,padding:"1px 7px",fontSize:9,fontWeight:700,letterSpacing:1}}>VO-{voNumber}</span>}
              <span style={{fontSize:8,color:C.stone,letterSpacing:2}}>CODSTUDIO v6.5</span>
            </div>
          </div>
        </div>
        <div style={{display:"flex",gap:5,alignItems:"center",flexWrap:"wrap"}}>
          {/* Status progress pill */}
          <div style={{display:"flex",alignItems:"center",gap:0,border:`1px solid ${C.stone}33`,borderRadius:3,overflow:"hidden",flexShrink:0}}>
            {["Draft","Sent","Signed"].map((st,i)=>{
              const active=status===st;
              const past=["Draft","Sent","Signed"].indexOf(status)>i;
              return(
                <div key={st} style={{padding:"4px 10px",fontSize:9,fontWeight:600,letterSpacing:1.5,
                  background:active?STATUS_COL[st]:past?"#2A2018":"transparent",
                  color:active?"#fff":past?C.stone+"88":C.stone+"55",
                  borderRight:i<2?`1px solid ${C.stone}33`:undefined,
                  fontFamily:T.sans,transition:"all .2s"}}>
                  {active&&"● "}{st.toUpperCase()}
                </div>
              );
            })}
          </div>
          {isLocked&&<span style={{fontSize:9,color:C.terra,letterSpacing:1,fontFamily:T.sans}}>{isFullyLocked?"🔒 SIGNED":"🔒 SENT"}</span>}
          {step==="quote"&&["Sent","Signed"].map(st=>(
            <button key={st} onClick={()=>{
              if(st===status)return;
              if(st==="Sent"){
                if(isVO&&!voApproved){alert("This Variation Order must be approved by a Director before it can be sent.");return;}
                if(!window.confirm(revised
                  ? "Re-issue as Sent?\n\nThis quote was revised after it was last sent. Make sure the client receives the updated document."
                  : "Mark as Sent?\n\nThe quote stays editable — any further change will return it to Draft for re-issue."))return;
                setRevised(false);
              }
              if(st==="Signed"){
                const signed=sig&&(sig.summaryCanvas||sig.tcCanvas||sig.warrantyCanvas||sig.signCanvas);
                if(!signed&&window.prompt("No client signature on file.\nEnter Director PIN to force Signed:")!==DIRECTOR_PIN)return;
                if(!window.confirm("Mark as Signed? Fully locks the quote and issues an invoice number."))return;
              }
              setStatus(st);
            }} style={{background:st===status?STATUS_COL[st]+"28":"transparent",color:st===status?STATUS_COL[st]:C.stone,border:`1px solid ${st===status?STATUS_COL[st]:C.stone+"44"}`,borderRadius:3,padding:"4px 9px",fontSize:10,cursor:"pointer",fontFamily:T.sans,fontWeight:600}}>{st}</button>
          ))}
          <div style={{width:1,height:14,background:C.stone+"44"}}/>
          <button onClick={handleSave} style={{background:C.creamD,border:`1px solid ${C.border}`,borderRadius:3,padding:"5px 11px",fontSize:10,cursor:"pointer",fontFamily:T.sans,color:C.stone,fontWeight:600}}>Save</button>
          <button onClick={()=>setShowEmail(e=>!e)} style={{background:showEmail?C.terra:C.creamD,border:`1px solid ${showEmail?C.terra:C.border}`,borderRadius:3,padding:"5px 11px",fontSize:10,cursor:"pointer",fontFamily:T.sans,color:showEmail?C.white:C.stone,fontWeight:600}}>✉ Email Note</button>
          {step==="preview"&&(
            <>
              <OBtn ch="← Edit" onClick={()=>setStep("quote")} col={C.gold} sm/>
              <button onClick={doPrintSummary} style={{background:C.creamD,border:`1px solid ${C.border}`,borderRadius:3,padding:"5px 10px",fontSize:10,cursor:"pointer",fontFamily:T.sans,color:C.stone,fontWeight:600}}>🖨 Summary Only</button>
              <button onClick={doFullPrint} title="Print the full quotation — all pages. Save as PDF to email the client." style={{background:C.gold,border:"none",borderRadius:3,padding:"5px 12px",fontSize:10,cursor:"pointer",fontFamily:T.sans,color:C.ink,fontWeight:600}}>🖨 Full Print / PDF</button>
            </>
          )}
          {step==="quote"&&subtotal>0&&(
            <Btn ch="Sign Document →" onClick={()=>{handleSave();setStep("preview");setTab("sign");}}/>
          )}
          {step==="quote"&&subtotal>0&&(
            <OBtn ch="Preview →" onClick={()=>{handleSave();setStep("preview");setTab("summary");}} col={C.gold} sm/>
          )}
        </div>
      </div>

      {/* TWO-WAY GATING PROMPT — approve THIS line: PIN now OR send to dashboard */}
      {poaPinPrompt!==null&&(
        <div className="no-print" style={{background:C.white,border:`1px solid ${C.terra}`,borderRadius:6,padding:"16px 20px",margin:"8px 16px 0",boxShadow:"0 2px 10px rgba(0,0,0,0.06)"}}>
          <div style={{fontSize:13,color:C.terra,fontFamily:T.sans,fontWeight:700,marginBottom:3}}>Senior / Director approval required</div>
          <div style={{fontSize:11,color:C.stone,fontFamily:T.sans,marginBottom:12}}>This POA line is greyed out and will not print until approved. Choose one:</div>
          <div style={{display:"flex",gap:16,flexWrap:"wrap",alignItems:"flex-start"}}>
            {/* Option 1: PIN now */}
            <div style={{flex:"1 1 220px",background:C.cream,border:`1px solid ${C.border}`,borderRadius:6,padding:"12px 14px"}}>
              <div style={{fontSize:10,fontWeight:700,color:C.ink,letterSpacing:1,marginBottom:8,fontFamily:T.sans}}>① ENTER PIN NOW</div>
              <div style={{fontSize:10,color:C.stone,marginBottom:9,fontFamily:T.sans}}>A senior/director keys the PIN to approve this line now.</div>
              <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
                <input type="password" value={poaPinBuf} onChange={e=>setPoaPinBuf(e.target.value)} onKeyDown={e=>e.key==="Enter"&&approvePoaPin()} placeholder="PIN" autoFocus style={{width:90,border:`1px solid ${C.border}`,borderRadius:3,padding:"6px 8px",fontSize:12,fontFamily:T.sans}}/>
                <Btn ch="Approve line" onClick={approvePoaPin} sm/>
              </div>
            </div>
            {/* Option 2: Send to dashboard */}
            <div style={{flex:"1 1 220px",background:C.cream,border:`1px solid ${C.border}`,borderRadius:6,padding:"12px 14px"}}>
              <div style={{fontSize:10,fontWeight:700,color:C.ink,letterSpacing:1,marginBottom:8,fontFamily:T.sans}}>② SEND TO DASHBOARD</div>
              <div style={{fontSize:10,color:C.stone,marginBottom:9,fontFamily:T.sans}}>Park it for a director to approve later from the dashboard.</div>
              <button onClick={()=>pushToDashboard("POA / custom price",`Item ${poaPinPrompt}`)} style={{background:C.terra,color:C.white,border:"none",borderRadius:4,padding:"7px 14px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:T.sans}}>Send for approval →</button>
            </div>
          </div>
          <button onClick={()=>{setPoaPinPrompt(null);setPoaPinBuf("");}} style={{marginTop:12,background:"transparent",border:"none",color:C.stone,cursor:"pointer",fontSize:11,fontFamily:T.sans,textDecoration:"underline"}}>Cancel</button>
        </div>
      )}
      {revised&&!isFullyLocked&&(
        <div className="no-print" style={{background:"#FFF8F2",border:`1px solid ${C.terra}`,borderRadius:4,padding:"11px 18px",margin:"8px 16px 0",display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <span style={{color:C.terra,fontSize:14}}>&#9670;</span>
          <span style={{fontSize:12,color:C.terra,fontFamily:T.sans,fontWeight:600}}>Revised after sending.</span>
          <span style={{fontSize:11,color:C.stone,fontFamily:T.sans}}>The client is holding an older version. Re-print and re-issue, then mark it Sent again.</span>
        </div>
      )}
      {/* EMAIL PANEL */}
      {showEmail&&(
        <div className="no-print" style={{background:"#FFFDF5",border:`1px solid ${C.gold}55`,borderRadius:4,padding:"16px 20px",margin:"8px 16px 0"}}>
          <div style={{fontSize:10,fontWeight:600,letterSpacing:2,color:C.stone,marginBottom:10,fontFamily:T.sans}}>EMAIL QUOTE LINK</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div>
              <label style={sL}>Client Email (Primary)</label>
              <input value={client.email||""} onChange={e=>setClient(c=>({...c,email:e.target.value}))} disabled={isLocked} title={isLocked?"Locked once Sent":""} placeholder="client@email.com"
                style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:3,padding:"7px 10px",fontSize:12,fontFamily:T.sans,background:C.cream,boxSizing:"border-box"}}/>
            </div>
            <div>
              <label style={sL}>CC Email (Optional)</label>
              <input value={client.email2||""} onChange={e=>setClient(c=>({...c,email2:e.target.value}))} placeholder="optional@email.com"
                style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:3,padding:"7px 10px",fontSize:12,fontFamily:T.sans,background:C.cream,boxSizing:"border-box"}}/>
            </div>

                              onApprove={()=>{}}

                              poaEdited={isPoaEdited(item.id)}
                              poaVal={poaPrices[item.id]}
                              onPoaUnlock={()=>requestPoaApproval(item.id)}
                              onPoaChange={v=>setPoaPrices(p=>({...p,[item.id]:v}))}
                              poaNeedsApp={poaNeedsApproval(item.id)}
                              poaApproved={isPoaApproved(item.id)}
                              dragHandlers={!item.srcId?pointerDragHandlers(item,trade):pointerDragHandlers(item,trade)}

                              onToggle={()=>toggleItem(c.id,trade.id,zone)}

                              onNote={v=>setNotes(n=>({...n,[c.id]:v}))}
                              onTier={()=>{}} onImg={()=>{}}
                              onApprove={()=>setCustoms(prev=>prev.map(x=>x.id===c.id?{...x,approved:true}:x))}
                              poaUnlocked={poaUnlocked}

                              poaVal={poaPrices[c.id]}
                              onPoaUnlock={()=>requestPoaApproval(c.id)}
                              onPoaChange={v=>setPoaPrices(p=>({...p,[c.id]:v}))}
                              poaNeedsApp={poaNeedsApproval(c.id)}
                              poaApproved={isPoaApproved(c.id)}

                {!isLocked&&(customForm?.tradeId===trade.id?(
                  <div style={{padding:"10px 14px",background:"#FFF8F2",borderTop:`1px solid ${C.border}`}}>

                          )}
                        </div>
                      ))}
                    </div>
                    <div style={{display:"flex",gap:7}}>
                      <Btn ch="Save Item" onClick={saveCustom} bg={C.terra} col={C.white} sm/>
                      <OBtn ch="Cancel" onClick={()=>setCustomForm(null)} col={C.stone} sm/>
                    </div>
                  </div>
