              <div style={{padding:"10px 20px",background:C.creamD,display:"grid",gridTemplateColumns:"44px 1fr 130px",alignItems:"baseline",borderTop:`1px solid ${C.border}`}}>
                <div/><div style={{fontSize:10,fontWeight:600,letterSpacing:2,color:C.stone}}>REVISED CONTRACT SUM</div>
                <div style={{fontFamily:T.serif,fontSize:18,fontWeight:300,color:C.ink,textAlign:"right"}}>{fmt(parentTotal+total)}</div>
              </div>
            )}
          </div>

          {/* PAYMENT SCHEDULE */}
          <div className="print-summary" style={{background:C.ink,borderRadius:4,padding:"18px 22px",marginBottom:10}}>
            <div style={{fontSize:9,letterSpacing:2,color:C.stone,marginBottom:2}}>PAYMENT SCHEDULE</div>
            <div style={{fontFamily:T.serif,fontSize:13,color:C.gold,marginBottom:8}}>{payKey==="custom"?"Custom Schedule":PAY_PRESETS[payKey]?.label}</div>
            {activePayItems.map((p,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #3A2E22"}}>
                <div style={{fontSize:12,color:C.stone,fontFamily:T.sans}}>{i+1}. {p.label}</div>
                <div style={{fontFamily:T.serif,fontSize:14,color:C.gold}}>{p.pct}% — {fmt(total*(parseFloat(p.pct)||0)/100)}</div>
              </div>
            ))}
            <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid #3A2E22"}}>
              <div style={{fontSize:9,color:C.stone,letterSpacing:1,marginBottom:2}}>PAYMENT DETAILS</div>
              <div style={{fontFamily:T.serif,fontSize:14,color:"#E8E0D4"}}>IKIGAI INTERIOR PTE LTD</div>
              <div style={{fontSize:11,color:C.stone,marginTop:2,fontFamily:T.sans}}>DBS Corporate · Acc 072-032036-0 · Swift: DBSSSGSG · PayNow UEN: 202041797K</div>
            </div>
            {entity!=="atelier"&&(
              <div style={{marginTop:14,paddingTop:12,borderTop:"1px solid #3A2E22",display:"flex",gap:16,alignItems:"center"}}>
                <img src={PAYNOW_QR} alt="PayNow QR" style={{width:118,height:118,borderRadius:4,background:"#fff",padding:5}}/>
                <div>
                  <div style={{fontSize:9,color:C.stone,letterSpacing:1,marginBottom:3,fontFamily:T.sans}}>SCAN TO PAY — PAYNOW</div>
                  <div style={{fontFamily:T.serif,fontSize:14,color:C.gold}}>UEN {PAYNOW_UEN}</div>
                  <div style={{fontSize:11,color:"#E8E0D4",marginTop:5,fontFamily:T.sans}}>Please quote reference <strong>{client.ref}</strong> in your payment remarks.</div>
                  {invNo&&<div style={{fontSize:11,color:C.gold,marginTop:2,fontFamily:T.sans}}>Invoice No: {invNo}</div>}
                </div>
              </div>
            )}
          </div>

          {/* Sign block for Summary */}
          <div className="print-summary" style={{background:C.white,borderRadius:4,border:`1px solid ${C.border}`,padding:"20px 24px",marginBottom:10}}>
            <div style={{fontSize:9,letterSpacing:2,color:C.stone,marginBottom:12,fontFamily:T.sans}}>ACKNOWLEDGEMENT — SUMMARY PAGE</div>
            <SigCanvas label="Client Signature" value={sig.summaryCanvas} onChange={v=>setSig(s=>({...s,summaryCanvas:v}))} locked={isFullyLocked}/>
            <div style={{fontSize:9,color:C.stone,marginTop:4,fontFamily:T.sans}}>I acknowledge the scope and cost summary above. · Ref: {client.ref}</div>
          </div>
        </div>

        {/* TERMS & CONDITIONS */}
        <div className="print-section" style={{display:(step==="preview"&&tab==="tc")?undefined:"none",background:C.white,borderRadius:4,border:`1px solid ${C.border}`,padding:"26px 30px"}}>
            <div style={{fontFamily:T.serif,fontSize:20,fontWeight:300,marginBottom:5}}>Terms & Conditions</div>
            <div style={{fontSize:10,color:C.stone,marginBottom:16,fontFamily:T.sans}}>Ref: {client.ref} · {client.name} · {client.date}</div>
            {TC.map((t,i)=><div key={i} style={{display:"flex",gap:9,padding:"6px 0",borderBottom:`1px solid ${C.creamD}`}}><span style={{fontFamily:T.serif,fontSize:14,color:C.gold,minWidth:17,flexShrink:0}}>{i+1}.</span><span style={{fontSize:12,color:C.ink,lineHeight:1.65}}>{t}</span></div>)}
            <div style={{fontFamily:T.serif,fontSize:17,fontWeight:300,margin:"18px 0 10px"}}>Material Quality</div>
            {MQ.map((m,i)=><div key={i} style={{display:"flex",gap:9,padding:"5px 0",borderBottom:`1px solid ${C.creamD}`}}><span style={{fontFamily:T.serif,fontSize:14,color:C.gold,minWidth:17,flexShrink:0}}>{i+1}.</span><span style={{fontSize:12,color:C.ink,lineHeight:1.65}}>{m}</span></div>)}
            <div style={{marginTop:20,paddingTop:14,borderTop:`1px solid ${C.border}`}}>
              <SigCanvas label="Client Signature — T&C Acknowledgement" value={sig.tcCanvas} onChange={v=>setSig(s=>({...s,tcCanvas:v}))} locked={isFullyLocked}/>
              <div style={{fontSize:9,color:C.stone,marginTop:4,fontFamily:T.sans}}>By signing above, I confirm I have read and understood all Terms & Conditions and Material Quality standards. · Ref: {client.ref}</div>
            </div>
        </div>

        {/* WARRANTY SCHEDULE */}
        <div className="print-section" style={{display:(step==="preview"&&tab==="warranty")?undefined:"none",background:C.white,borderRadius:4,border:`1px solid ${C.border}`,padding:"26px 30px"}}>
            <div style={{fontFamily:T.serif,fontSize:20,fontWeight:300,marginBottom:6}}>Warranty Schedule</div>
            <div style={{fontSize:12,color:C.stone,marginBottom:16,lineHeight:1.7,fontFamily:T.sans}}>Warranty commences after full handover or stay-in period, whichever is earlier. Covers workmanship & material integrity of contracted scope. Does not apply to misuse, third-party tampering, natural wear and tear, or unauthorised repair works.</div>
            <div style={{borderRadius:3,overflow:"hidden",marginBottom:20}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 170px",padding:"7px 18px",background:C.ink}}>
                {["SCOPE","WARRANTY PERIOD"].map((h,i)=><div key={i} style={{fontSize:9,fontWeight:600,letterSpacing:1.2,color:C.stone,textAlign:i===1?"right":"left"}}>{h}</div>)}
              </div>
              {WARRANTY.map((w,i)=>(
                <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 170px",padding:"11px 18px",borderBottom:`1px solid ${C.border}`,background:i%2===0?C.white:C.cream}}>
                  <div style={{fontSize:12,color:C.ink,fontFamily:T.sans}}>{w.item}</div>
                  <div style={{fontFamily:T.serif,fontSize:14,color:C.gold,textAlign:"right"}}>{w.years}</div>
                </div>
              ))}
            </div>
            <SigCanvas label="Client Signature — Warranty Acknowledgement" value={sig.warrantyCanvas} onChange={v=>setSig(s=>({...s,warrantyCanvas:v}))} locked={isFullyLocked}/>
            <div style={{fontSize:9,color:C.stone,marginTop:4,fontFamily:T.sans}}>By signing above, I acknowledge the warranty terms stated. · Ref: {client.ref}</div>
        </div>
        </>)}

      </div>
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function LoginGate({onIn}){
  const[err,setErr]=useState("");
  const go=async()=>{
    setErr("");
    const{error}=await sb.auth.signInWithOAuth({
      provider:"azure",
      options:{scopes:"email openid profile",redirectTo:window.location.href.split("?")[0]}
    });
    if(error)setErr(error.message);
  };
  return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.cream,fontFamily:T.sans}}>
      <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:6,padding:"46px 44px",textAlign:"center",maxWidth:400}}>
        <div style={{fontFamily:T.serif,fontSize:26,letterSpacing:5,color:C.ink}}>IKIGAI INTERIOR</div>
        <div style={{fontSize:9,letterSpacing:3,color:C.stone,marginTop:5,marginBottom:30}}>CODSTUDIO — QUOTATION BUILDER</div>
        <button onClick={go} style={{width:"100%",background:C.ink,color:C.gold,border:`1px solid ${C.gold}`,borderRadius:3,padding:"13px 20px",fontSize:12,letterSpacing:1,cursor:"pointer",fontFamily:T.sans,fontWeight:600}}>
          Sign in with Microsoft
        </button>
        <div style={{fontSize:10,color:C.stone,marginTop:16,lineHeight:1.6}}>Use your @ikigaiinterior.com account.<br/>Your login is stamped on every quote you create.</div>
        {err&&<div style={{fontSize:10,color:C.terra,marginTop:12}}>{err}</div>}
      </div>
    </div>
  );
}

function App(){
  const isAdmin=window.location.search.includes("admin");
  const[screen,setScreen]=useState(isAdmin?"admin":"list");
  const[activeQuote,setActiveQuote]=useState(null);
  const[booted,setBooted]=useState(false);
  const[authed,setAuthed]=useState(false);
  const[denied,setDenied]=useState("");
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{
      const u=data?.session?.user;
      if(!u){setBooted(true);return;}
      const email=(u.email||u.user_metadata?.email||"").toLowerCase();
      const s=staffByEmail(email);
      if(!s){setDenied(email||"unknown account");setBooted(true);return;}
      SESSION={...s,email};USER_ROLE=s.role;
      setAuthed(true);
      cloudPull().then(()=>setBooted(true));
    });
  },[]);
  const signOut=async()=>{await sb.auth.signOut();window.location.reload();};
  const openQuote=q=>{setActiveQuote(q);setScreen("builder");};
  const newQuote=(ptype="condo")=>{const q=blankQuote(null,ptype);openQuote(q);};
  const newVO=parent=>{const q=blankQuote(parent);openQuote(q);};
  const saveQuote=async data=>{
    if(isDraftRef(data.client?.ref))return;   // never persist an unnumbered draft
    // Issue invoice number the moment it is Signed
    if(data.status==="Signed"&&!data.invNo){
      const iv=await issueInv(data.entity);
      if(iv)data={...data,invNo:iv};
    }
    const versions=[...loadVersions()];
    const idx=versions.findIndex(v=>v.id===data.id);
    if(idx>=0)versions[idx]=data;else versions.unshift(data);
    saveVersions(versions);
    cloudPush(data);
    if(activeQuote&&activeQuote.id===data.id&&data.client?.ref!==activeQuote.client?.ref)setActiveQuote(data);
  };
  const goBack=()=>{setScreen("list");setActiveQuote(null);};
  if(!booted)return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.cream,fontFamily:T.sans,color:C.stone,fontSize:13,letterSpacing:1}}>Connecting to CODSTUDIO…</div>;
  if(denied)return(
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.cream,fontFamily:T.sans,textAlign:"center"}}>
      <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:6,padding:"40px 44px"}}>
        <div style={{fontFamily:T.serif,fontSize:18,color:C.ink,marginBottom:8}}>Access not authorised</div>
        <div style={{fontSize:12,color:C.stone,marginBottom:20}}>{denied} is not on the Ikigai staff list.</div>
        <button onClick={signOut} style={{background:C.creamD,border:`1px solid ${C.border}`,borderRadius:3,padding:"8px 18px",fontSize:11,cursor:"pointer",fontFamily:T.sans,color:C.stone}}>Sign out</button>
      </div>
    </div>);
  if(!authed)return <LoginGate/>;

  if(screen==="admin")return <AdminPanel onBack={()=>setScreen("list")}/>;
  if(screen==="builder"&&activeQuote)return <QuoteBuilder initData={activeQuote} onSave={saveQuote} onBack={goBack}/>;
  return <VersionManager onOpen={openQuote} onNew={newQuote} onNewVO={newVO} onAdmin={()=>setScreen("admin")}/>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
