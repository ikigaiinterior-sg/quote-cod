// ── SIGNATURE CANVAS ──────────────────────────────────────────────────────────
function SigCanvas({value,onChange,label,locked}){
  const ref=useRef(null);
  const drawing=useRef(false);
  const lastPos=useRef(null);

  const getPos=(e,canvas)=>{
    const r=canvas.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-r.left)*(canvas.width/r.width),y:(src.clientY-r.top)*(canvas.height/r.height)};
  };

  useEffect(()=>{
    const c=ref.current;if(!c)return;
    const ctx=c.getContext("2d");
    if(value){const img=new Image();img.onload=()=>{ctx.clearRect(0,0,c.width,c.height);ctx.drawImage(img,0,0);};img.src=value;}
    else{ctx.clearRect(0,0,c.width,c.height);}
  },[value]);

  const start=e=>{
    if(locked)return;
    e.preventDefault();
    drawing.current=true;
    lastPos.current=getPos(e,ref.current);
  };
  const move=e=>{
    if(!drawing.current||locked)return;
    e.preventDefault();
    const c=ref.current;const ctx=c.getContext("2d");
    const pos=getPos(e,c);
    ctx.beginPath();ctx.moveTo(lastPos.current.x,lastPos.current.y);
    ctx.lineTo(pos.x,pos.y);
    ctx.strokeStyle=C.ink;ctx.lineWidth=2;ctx.lineCap="round";ctx.stroke();
    lastPos.current=pos;
  };
  const end=e=>{
    if(!drawing.current)return;
    drawing.current=false;
    onChange(ref.current.toDataURL());
  };
  const clear=()=>{
    if(locked)return;
    const c=ref.current;
    c.getContext("2d").clearRect(0,0,c.width,c.height);
    onChange("");
  };

  return(
    <div>
      {label&&<div style={{fontSize:9,letterSpacing:1.5,color:C.stone,marginBottom:4,fontFamily:T.sans}}>{label}</div>}
      <div style={{position:"relative",border:`1px dashed ${C.gold}`,borderRadius:3,background:"#FEFCF8",overflow:"hidden"}}>
        <canvas ref={ref} width={340} height={80}
          style={{display:"block",width:"100%",height:80,cursor:locked?"not-allowed":"crosshair",touchAction:"none"}}
          onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
        {!locked&&<button onClick={clear} style={{position:"absolute",top:4,right:4,background:"transparent",border:`1px solid ${C.border}`,borderRadius:2,padding:"2px 6px",fontSize:9,cursor:"pointer",color:C.stone,fontFamily:T.sans}}>Clear</button>}
      </div>
    </div>
  );
}

// ── ADMIN PANEL ───────────────────────────────────────────────────────────────
function AdminPanel({onBack}){
  const[auth,setAuth]=useState(false);
  const[pin,setPin]=useState("");
  const[trades,setTrades]=useState(loadTrades);
  const[editId,setEditId]=useState(null);
  const[editBuf,setEditBuf]=useState({});
  const[csvMsg,setCsvMsg]=useState("");
  const fileRef=useRef(null);

  const tryAuth=()=>{if(pin===DIRECTOR_PIN)setAuth(true);else alert("Incorrect PIN");};

  const startEdit=(item)=>{setEditId(item.id);setEditBuf({desc:item.desc,price:String(item.price),unit:item.unit});};
  const saveEdit=()=>{
    const fields={desc:editBuf.desc,price:parseFloat(editBuf.price)||0,unit:editBuf.unit};
    saveTradeOverride(editId,fields);
    setTrades(prev=>prev.map(t=>({...t,items:t.items.map(i=>i.id===editId?{...i,...fields}:i)})));
    setEditId(null);
  };

  const handleCsv=e=>{
    const f=e.target.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const text=ev.target.result;
        const rows=text.split("\n").map(r=>r.split(",").map(c=>c.trim().replace(/^"|"$/g,"")));
        const header=rows[0].map(h=>h.toLowerCase());
        const idIdx=header.indexOf("id"),descIdx=header.indexOf("desc"),priceIdx=header.indexOf("price"),unitIdx=header.indexOf("unit");
        if(idIdx<0||descIdx<0||priceIdx<0)throw new Error("CSV must have columns: id, desc, price, unit");
        let count=0;
        rows.slice(1).forEach(row=>{
          if(!row[idIdx])return;
          const fields={};
          if(descIdx>=0&&row[descIdx])fields.desc=row[descIdx];
          if(priceIdx>=0&&row[priceIdx])fields.price=parseFloat(row[priceIdx])||0;
          if(unitIdx>=0&&row[unitIdx])fields.unit=row[unitIdx];
          saveTradeOverride(row[idIdx],fields);count++;
        });
        setTrades(loadTrades());
        setCsvMsg(`✓ ${count} items updated from CSV`);
      }catch(err){setCsvMsg("✕ Error: "+err.message);}
    };
    reader.readAsText(f);
  };

  if(!auth)return(
    <div style={{background:C.cream,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:T.sans}}>
      <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:4,padding:"40px",width:320,textAlign:"center"}}>
        <div style={{fontFamily:T.serif,fontSize:20,fontWeight:300,color:C.ink,marginBottom:6}}>Admin Access</div>
        <div style={{fontSize:11,color:C.stone,marginBottom:20}}>Director PIN required</div>
        <input type="password" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&tryAuth()}
          placeholder="Enter PIN" style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:3,padding:"10px",fontSize:13,fontFamily:T.sans,marginBottom:10,boxSizing:"border-box"}}/>
        <button onClick={tryAuth} style={{width:"100%",background:C.gold,color:C.ink,border:"none",borderRadius:3,padding:"10px",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:T.sans,marginBottom:10}}>Unlock</button>
        <button onClick={onBack} style={{background:"transparent",border:"none",color:C.stone,cursor:"pointer",fontSize:11,fontFamily:T.sans}}>← Back</button>
      </div>
    </div>
  );

  return(
    <div style={{background:C.cream,minHeight:"100vh",fontFamily:T.sans}}>
      <div style={{background:C.ink,padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{fontFamily:T.serif,fontSize:16,color:C.gold,letterSpacing:3}}>CODSTUDIO ADMIN</div>
          <div style={{fontSize:9,color:C.stone,letterSpacing:2}}>RATE CARD EDITOR — DIRECTOR ONLY</div>
        </div>
        <button onClick={onBack} style={{background:"transparent",border:`1px solid ${C.stone}44`,borderRadius:3,padding:"6px 12px",fontSize:10,cursor:"pointer",color:C.stone}}>← Dashboard</button>
      </div>
      <div style={{maxWidth:1000,margin:"0 auto",padding:"24px 20px"}}>
        {/* BULK CSV */}
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:4,padding:"20px",marginBottom:16}}>
          <div style={{fontFamily:T.serif,fontSize:17,fontWeight:300,marginBottom:4}}>Bulk Upload via CSV</div>
          <div style={{fontSize:11,color:C.stone,marginBottom:12}}>CSV must have columns: <strong>id, desc, price, unit</strong> (header row required). Item IDs must match existing rate card IDs (e.g. 4.1, 9.13).</div>
          <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
            <input ref={fileRef} type="file" accept=".csv" onChange={handleCsv} style={{display:"none"}}/>
            <button onClick={()=>fileRef.current?.click()} style={{background:C.gold,color:C.ink,border:"none",borderRadius:3,padding:"8px 16px",fontSize:11,cursor:"pointer",fontFamily:T.sans,fontWeight:600}}>Choose CSV File</button>
            {csvMsg&&<span style={{fontSize:11,color:csvMsg.startsWith("✓")?C.success:C.danger}}>{csvMsg}</span>}
          </div>
        </div>
        {/* INLINE EDITOR */}
        <div style={{background:C.white,border:`1px solid ${C.border}`,borderRadius:4,overflow:"hidden"}}>
          <div style={{padding:"14px 20px",fontFamily:T.serif,fontSize:17,fontWeight:300,borderBottom:`1px solid ${C.border}`}}>Inline Item Editor</div>
          <div style={{display:"grid",gridTemplateColumns:"60px 1fr 80px 70px 80px",gap:0,background:C.creamD,padding:"6px 16px"}}>
            {["ID","DESCRIPTION","PRICE","UNIT",""].map((h,i)=><div key={i} style={{fontSize:9,fontWeight:600,letterSpacing:1,color:C.stone}}>{h}</div>)}
          </div>
          <div style={{maxHeight:"60vh",overflowY:"auto"}}>
            {trades.map(trade=>(
              <div key={trade.id}>
                <div style={{padding:"8px 16px",background:C.creamD,borderTop:`1px solid ${C.border}`,fontFamily:T.sans,fontSize:10,fontWeight:600,letterSpacing:1,color:C.stone}}>{trade.code} — {trade.name}</div>
                {trade.items.map(item=>(
                  <div key={item.id} style={{display:"grid",gridTemplateColumns:"60px 1fr 80px 70px 80px",gap:0,padding:"6px 16px",borderBottom:`1px solid #F5F0E8`,alignItems:"center",background:editId===item.id?"#FFFDF5":"#fff"}}>
                    <div style={{fontSize:10,color:C.stone,fontFamily:T.sans}}>{item.id}</div>
                    {editId===item.id?(
                      <>
                        <input value={editBuf.desc} onChange={e=>setEditBuf(b=>({...b,desc:e.target.value}))} style={{border:`1px solid ${C.gold}`,borderRadius:2,padding:"3px 6px",fontSize:11,fontFamily:T.sans,marginRight:6}}/>
                        <input value={editBuf.price} onChange={e=>setEditBuf(b=>({...b,price:e.target.value}))} style={{border:`1px solid ${C.gold}`,borderRadius:2,padding:"3px 6px",fontSize:11,fontFamily:T.sans,width:70,marginRight:6}}/>
                        <input value={editBuf.unit} onChange={e=>setEditBuf(b=>({...b,unit:e.target.value}))} style={{border:`1px solid ${C.gold}`,borderRadius:2,padding:"3px 6px",fontSize:11,fontFamily:T.sans,width:60,marginRight:6}}/>
                        <div style={{display:"flex",gap:4}}>
                          <button onClick={saveEdit} style={{background:C.gold,color:C.ink,border:"none",borderRadius:2,padding:"3px 8px",fontSize:9,cursor:"pointer",fontFamily:T.sans}}>Save</button>
                          <button onClick={()=>setEditId(null)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:2,padding:"3px 6px",fontSize:9,cursor:"pointer",color:C.stone}}>✕</button>
                        </div>
                      </>
                    ):(
                      <>
                        <div style={{fontSize:11,color:C.ink,fontFamily:T.sans,paddingRight:8}}>{item.desc}</div>
                        <div style={{fontSize:11,fontFamily:T.serif,color:C.stone}}>{item.price>0?fmt(item.price):"POA"}</div>
                        <div style={{fontSize:10,color:C.stone,fontFamily:T.sans}}>{item.unit}</div>
                        <button onClick={()=>startEdit(item)} style={{background:"transparent",border:`1px solid ${C.border}`,borderRadius:2,padding:"3px 8px",fontSize:9,cursor:"pointer",color:C.stone,fontFamily:T.sans}}>Edit</button>
                      </>
                    )}
                  </div>
                ))}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── QUOTE BUILDER ─────────────────────────────────────────────────────────────
function QuoteBuilder({initData,onSave,onBack}){
  const TRADES=useMemo(()=>loadTrades(),[]);
  const[step,setStep]=useState("quote");
  const[tab,setTab]=useState("summary");
  const[quoteName,setQuoteName]=useState(initData.name||"New Quote");
  const[projectName,setProjectName]=useState(initData.projectName||"");
  const isVO=initData.isVO||false;
  const voNumber=initData.voNumber||0;
  const[entity,setEntity]=useState(initData.entity||"ikigai");
  const ent=ENTITIES.find(e=>e.id===entity);
  const[client,setClient]=useState(initData.client||{name:"",address:"",email:"",email2:"",phone:"",ref:genRef(),date:todayStr()});
  const[idStaff,setIdStaff]=useState(initData.idStaff||"");
  const[status,setStatus]=useState(initData.status||"Draft");
  const[unitSqft,setUnitSqft]=useState(initData.unitSqft||0);
  const[designOn,setDesignOn]=useState(initData.designOn||{});
  const[qtys,setQtys]=useState(initData.qtys||{});
  const[itemOn,setItemOn]=useState(initData.itemOn||{});
  const[tiers,setTiers]=useState(initData.tiers||{});
  const[notes,setNotes]=useState(initData.notes||{});
  const[imgs,setImgs]=useState({});
  const[zoneOverride,setZoneOverride]=useState(initData.zoneOverride||{});
  const[dupes,setDupes]=useState(initData.dupes||[]);
  const[openTrades,setOpenTrades]=useState(initData.openTrades||{1:true});
  const[openZones,setOpenZones]=useState(initData.openZones||{});
  const[payKey,setPayKey]=useState(initData.payKey||"standard");
  const[customPay,setCustomPay]=useState(initData.customPay||[]);
  const[showCPay,setShowCPay]=useState(false);
  const[disc,setDisc]=useState(initData.disc||"");
  const[discOk,setDiscOk]=useState(initData.discOk||false);
  const[usePaypal,setUsePaypal]=useState(initData.usePaypal||false);
  const[usePaynow,setUsePaynow]=useState(initData.usePaynow||false);
  const[customs,setCustoms]=useState(initData.customs||[]);
  const[removalOn,setRemovalOn]=useState(initData.removalOn||{});
  const[customForm,setCustomForm]=useState(null);
  const[sig,setSig]=useState(initData.sig||{clientName:"",date:"",agreed:false,directorDate:"",idDate:"",summaryCanvas:"",tcCanvas:"",warrantyCanvas:""});
  const[showEmail,setShowEmail]=useState(false);
  const[showFullPrintPin,setShowFullPrintPin]=useState(false);
  const[printPin,setPrintPin]=useState("");
  const[dragId,setDragId]=useState(null);
  const[dragTarget,setDragTarget]=useState(null);
  const imgRefs=useRef({});
  const saveTimerRef=useRef(null);

  const isLocked=status==="Sent"||status==="Signed";
  const isFullyLocked=status==="Signed";
  const gst=ent.gst;
  const isOn=id=>itemOn[id]===true;
  const getZone=item=>zoneOverride[item.id]||item.zone||"Whole House";
  const getTier=id=>tiers[id]||"base";
  const getEP=item=>{const t=getTier(item.id);if(!item.carpentry||t==="base")return item.price;return Math.round(item.price*FINISH[t].mult*100)/100;};
  const zK=(tid,z)=>`${tid}-${z}`;
  const isZO=(tid,z)=>openZones[zK(tid,z)]!==false;

  // Auto-save debounced
  useEffect(()=>{
    clearTimeout(saveTimerRef.current);
    saveTimerRef.current=setTimeout(()=>{
      const data=buildSaveData();
      onSave(data);
    },1500);
    return()=>clearTimeout(saveTimerRef.current);
  },[quoteName,projectName,entity,client,idStaff,status,unitSqft,designOn,qtys,itemOn,tiers,notes,zoneOverride,dupes,customs,openTrades,openZones,payKey,customPay,disc,discOk,usePaypal,sig]);

  const buildSaveData=()=>({
    id:initData.id,name:quoteName,projectName,updatedAt:todayStr(),createdAt:initData.createdAt||todayStr(),
    entity,status,unitSqft,designOn,client,idStaff,qtys,itemOn,tiers,notes,zoneOverride,dupes,customs,removalOn,
    openTrades,openZones,payKey,customPay,disc,discOk,usePaypal,usePaynow,sig
  });
  const handleSave=()=>onSave(buildSaveData());

  const handleImg=(id,e)=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setImgs(i=>({...i,[id]:ev.target.result}));r.readAsDataURL(f);};

  // Trade/zone logic
  const tradeIDs=t=>[...t.items.map(i=>i.id),...dupes.filter(d=>d.tradeId===t.id).map(d=>d.id),...customs.filter(c=>c.tradeId===t.id).map(c=>c.id)];
  const zoneIDs=(t,z)=>[...t.items.filter(i=>getZone(i)===z).map(i=>i.id),...dupes.filter(d=>d.tradeId===t.id&&d.zone===z).map(d=>d.id),...customs.filter(c=>c.tradeId===t.id&&c.zone===z).map(c=>c.id)];
  const tradeOn=t=>tradeIDs(t).some(id=>itemOn[id]===true);
  const zoneOn=(t,z)=>zoneIDs(t,z).some(id=>itemOn[id]===true);
  const toggleTM=t=>{
    const ids=tradeIDs(t);
    const willBeOn=!ids.some(id=>itemOn[id]===true);
    const ns={};ids.forEach(id=>{ns[id]=willBeOn;});
    setItemOn(o=>({...o,...ns}));
    setOpenTrades(o=>({...o,[t.id]:willBeOn}));
    const zu={};ZONE_ORDER.forEach(z=>{zu[zK(t.id,z)]=willBeOn;});
    setOpenZones(o=>({...o,...zu}));
  };
  const toggleZM=(t,z)=>{
    const ids=zoneIDs(t,z);
    const willBeOn=!ids.some(id=>itemOn[id]===true);
    const ns={};ids.forEach(id=>{ns[id]=willBeOn;});
    setItemOn(o=>({...o,...ns}));
    if(willBeOn)setOpenTrades(o=>({...o,[t.id]:true}));
    setOpenZones(o=>({...o,[zK(t.id,z)]:true}));
  };
  const toggleItem=(id,tradeId,zone)=>{
    const nowOn=!isOn(id);setItemOn(o=>({...o,[id]:nowOn}));
    if(nowOn){setOpenTrades(o=>({...o,[tradeId]:true}));setOpenZones(o=>({...o,[zK(tradeId,zone)]:true}));}
  };

  // Drag via pointer events
  const pointerDragHandlers=(item,trade)=>{
    if(trade.noZone||!isOn(item.id)||isLocked)return{};
    return{
      onPointerDown:e=>{
        e.currentTarget.setPointerCapture(e.pointerId);
        setDragId(item.id);
      },
      onPointerUp:e=>{
        if(dragId&&dragTarget){
          const{tradeId:tId,zone}=dragTarget;
          const srcZ=getZone(item);
          if(srcZ!==zone){
            const already=dupes.some(d=>d.srcId===dragId&&d.zone===zone&&d.tradeId===tId);
            if(!already){
              const nid=`dupe-${dragId}-${zone}-${Date.now()}`;
              setDupes(d=>[...d,{id:nid,srcId:dragId,tradeId:tId,zone,desc:item.desc,unit:item.unit,price:getEP(item),carpentry:item.carpentry,addon:item.addon}]);
            }
          }
        }
        setDragId(null);setDragTarget(null);
        e.currentTarget.releasePointerCapture(e.pointerId);
      },
      onPointerMove:e=>{
        if(!dragId)return;
        // find zone under cursor
        const els=document.elementsFromPoint(e.clientX,e.clientY);
        const zoneEl=els.find(el=>el.dataset&&el.dataset.zone&&el.dataset.tradeid);
        if(zoneEl){
          setDragTarget({tradeId:parseInt(zoneEl.dataset.tradeid),zone:zoneEl.dataset.zone});
        }
      },
    };
  };

  // Subtotals
  const tradeSubs=useMemo(()=>TRADES.map(t=>{
    const base=t.items.reduce((s,i)=>isOn(i.id)?s+(parseFloat(qtys[i.id])||0)*getEP(i):s,0);
    const dp=dupes.filter(d=>d.tradeId===t.id).reduce((s,d)=>isOn(d.id)?s+(parseFloat(qtys[d.id])||0)*d.price:s,0);
    const cu=customs.filter(c=>c.tradeId===t.id&&c.approved).reduce((s,c)=>isOn(c.id)?s+(parseFloat(qtys[c.id])||1)*c.price:s,0);
    const removal=isVO?t.items.reduce((s,i)=>removalOn[i.id]&&isOn(i.id)?s-((parseFloat(qtys[i.id])||0)*getEP(i)):s,0):0;
    return{id:t.id,code:t.code,name:t.name,sub:base+dp+cu+removal};
  }),[qtys,itemOn,tiers,dupes,customs,removalOn]);

  const getDesignPrice=item=>{
    if(item.fixedPrice!==null)return item.fixedPrice;
    return Math.round(unitSqft*DESIGN_PSF_RATE*(item.psfPct||0));
  };
  const designSubtotal=useMemo(()=>DESIGN_ITEMS_CFG.reduce((s,item)=>designOn[item.id]?s+getDesignPrice(item):s,0),[designOn,unitSqft]);
  const subtotal=designSubtotal+tradeSubs.reduce((s,t)=>s+t.sub,0);
  const discAmt=discOk?(parseFloat(disc)||0):0;
  const afterDisc=subtotal-discAmt;
  const gstAmt=gst?afterDisc*0.09:0;
  const total=afterDisc+gstAmt;
  const paypalFee=usePaypal?total*0.035:0;
  const grandTotal=total+paypalFee;
  const activePayItems=useMemo(()=>payKey==="custom"?customPay:PAY_PRESETS[payKey]?.items||[],[payKey,customPay]);
  const cpTotal=customPay.reduce((s,p)=>s+(parseFloat(p.pct)||0),0);

  const saveCustom=()=>{
    if(!customForm?.desc||!customForm?.price)return;
    const id=`c${Date.now()}`;
    const capDesc=customForm.desc.charAt(0).toUpperCase()+customForm.desc.slice(1);
    setCustoms(c=>[...c,{id,tradeId:customForm.tradeId,zone:customForm.zone||"Whole House",desc:capDesc,unit:customForm.unit||"LS",price:parseFloat(customForm.price)||0,approved:false}]);
    setCustomForm(null);
  };

  // Shared UI helpers
  const Btn=({ch,onClick,bg=C.gold,col=C.ink,sm,dis})=><button onClick={onClick} disabled={dis} style={{background:dis?C.creamD:bg,color:dis?C.stone:col,border:"none",borderRadius:3,padding:sm?"5px 10px":"8px 16px",fontSize:sm?9:11,fontWeight:600,cursor:dis?"not-allowed":"pointer",fontFamily:T.sans,opacity:dis?0.6:1}}>{ch}</button>;
  const OBtn=({ch,onClick,col=C.stone,sm})=><button onClick={onClick} style={{background:"transparent",color:col,border:`1px solid ${col}`,borderRadius:3,padding:sm?"5px 10px":"8px 16px",fontSize:sm?9:11,fontWeight:600,cursor:"pointer",fontFamily:T.sans}}>{ch}</button>;
  const sL={fontFamily:T.sans,fontSize:10,fontWeight:600,letterSpacing:1.5,color:C.stone,textTransform:"uppercase",display:"block",marginBottom:5};
  const card={background:C.white,borderRadius:4,border:`1px solid ${C.border}`,marginBottom:10,overflow:"hidden"};
  const inp=(k,lbl,ph)=>(
    <div>
      <label style={sL}>{lbl}</label>
      <input style={{width:"100%",border:`1px solid ${C.border}`,borderRadius:3,padding:"8px 11px",fontSize:13,fontFamily:T.sans,background:C.cream,color:C.ink,boxSizing:"border-box"}}
        placeholder={ph} value={client[k]||""} onChange={e=>setClient(c=>({...c,[k]:e.target.value}))}/>
    </div>
  );

  // Print
  const doPrintSummary=()=>{

                    <div key={i} style={{display:"flex",gap:6,marginBottom:6,alignItems:"center"}}>

                      <input type="number" placeholder="%" value={p.pct} onChange={e=>setCustomPay(cp=>cp.map((x,j)=>j===i?{...x,pct:e.target.value}:x))} style={{width:50,border:`1px solid ${C.border}`,borderRadius:3,padding:"4px 6px",fontSize:11,fontFamily:T.sans,background:C.cream,textAlign:"center"}}/>

        {/* DESIGN TRADE 01 */}
        {(()=>{
          const psfPool=unitSqft*DESIGN_PSF_RATE;
          const anyOn=DESIGN_ITEMS_CFG.some(i=>designOn[i.id]);

            <div style={card}>

              {tOpen&&(

                  <div style={{padding:"8px 14px",background:"#FFFDF5",borderBottom:`1px solid ${C.border}`,display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>

                  <div style={{display:"grid",gridTemplateColumns:"24px 28px 1fr 90px 80px",gap:3,background:C.creamD,padding:"5px 10px"}}>

                      <div key={item.id} style={{borderBottom:`1px solid #F5F0E8`,background:on?"#FFFDF8":"#fff"}}>

                          <div style={{display:"flex",justifyContent:"center",paddingTop:2}}>
                            <Toggle on={on} small disabled={isLocked} onClick={()=>{if(!isLocked)setDesignOn(d=>({...d,[item.id]:!d[item.id]}));}}/>

                              {item.psfPct&&<span title={`${(item.psfPct*100).toFixed(0)}% of design pool`} style={{fontSize:8,color:C.stone,background:C.creamD,borderRadius:2,padding:"1px 4px",cursor:"help"}}>i</span>}
                            </div>
                            {on&&<textarea placeholder="Notes to client..." value={notes[item.id]||""} onChange={e=>setNotes(n=>({...n,[item.id]:e.target.value}))} rows={1}

                          <div style={{fontFamily:T.serif,fontSize:13,textAlign:"right",color:price>0?C.ink:C.stone,paddingTop:3}}>
                            {price>0?fmt(price):<span style={{color:C.gold,fontSize:11}}>TBC</span>}
                          </div>
                          <div style={{fontFamily:T.serif,fontSize:13,color:on&&price>0?C.ink:C.border,textAlign:"right",paddingTop:3,fontWeight:on&&price>0?600:400}}>

        {/* TRADES 02–13 */}
        {TRADES.filter(t=>t.id!==1).map(trade=>{
          const tSub=tradeSubs.find(t=>t.id===trade.id)?.sub||0;

                    <div style={{fontSize:11,color:C.stone,fontFamily:T.sans,marginBottom:2}}>UEN: 202041797K</div>
                    <div style={{fontSize:11,color:C.terra,fontFamily:T.sans}}>Remarks: {client.ref||"your quote ref"}</div>
                  </div>
                </div>
              )}
            </div>

            {/* PayPal */}
            <div style={{background:C.white,borderRadius:4,border:`1px solid ${C.border}`,padding:"18px 22px"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:usePaypal?14:0}}>
                <div style={{display:"flex",alignItems:"center",gap:12}}>
                  <svg width="72" height="20" viewBox="0 0 72 20"><text x="0" y="16" fontFamily="Arial,sans-serif" fontSize="14" fontWeight="bold" fill="#003087">Pay</text><text x="26" y="16" fontFamily="Arial,sans-serif" fontSize="14" fontWeight="bold" fill="#009cde">Pal</text></svg>
                  <div>
                    <div style={{fontSize:12,fontWeight:600,color:C.ink,fontFamily:T.sans}}>Pay via PayPal</div>
                    <div style={{fontSize:10,color:C.stone,fontFamily:T.sans}}>3.5% surcharge · paypal.me/ikigaiinterior</div>
                  </div>
                </div>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  {usePaypal&&<span style={{fontSize:11,color:C.terra,fontFamily:T.sans}}>Total: {fmt(grandTotal)}</span>}
                  <Toggle on={usePaypal} onClick={()=>setUsePaypal(p=>!p)}/>
                </div>
              </div>
              {usePaypal&&(
                <div style={{paddingTop:14,borderTop:`1px solid ${C.border}`}}>
                  <div style={{fontSize:11,color:C.stone,fontFamily:T.sans,marginBottom:10}}>
                    Base: {fmt(total)} + fee (3.5%): <strong style={{color:C.terra}}>{fmt(paypalFee)}</strong> = <strong style={{color:C.ink,fontFamily:T.serif}}>{fmt(grandTotal)}</strong>
                  </div>
                  <a href={`https://www.paypal.me/ikigaiinterior/${grandTotal.toFixed(2)}SGD`} target="_blank" rel="noopener"
                    style={{display:"inline-block",background:"#0070ba",color:"#fff",borderRadius:20,padding:"9px 22px",fontSize:12,fontWeight:600,textDecoration:"none",fontFamily:T.sans}}>
                    Pay {fmt(grandTotal)} via PayPal →
                  </a>
                </div>
              )}
            </div>

            {/* Receipt trigger */}
            {activePayItems.some((_,i)=>sig[`paid_${i}`])&&(
              <a href={`mailto:${client.email||""}?cc=accounts@ikigaiinterior.com&subject=Payment Receipt — ${client.ref} — Ikigai Interior&body=Dear ${client.name||"Client"},\n\nThank you for your payment.\n\nRef: ${client.ref} · Project: ${projectName||"—"}\n\n${activePayItems.map((p,i)=>sig[`paid_${i}`]?`✓ Stage ${i+1} (${p.pct}%) — ${fmt(grandTotal*(parseFloat(p.pct)||0)/100)}`:"").filter(Boolean).join("\n")}\n\nKindly retain this as your official receipt.\n\nWarm regards,\n${idStaff||"Dylan Lu"}\nIkigai Interior Pte Ltd\nwork@ikigaiinterior.com`}
                style={{display:"inline-block",background:C.gold,color:C.ink,borderRadius:3,padding:"10px 20px",fontSize:12,fontWeight:600,textDecoration:"none",fontFamily:T.sans}}>
                ✉ Send Receipt to Client
              </a>
            )}
          </div>
          );
        })()}

        {/* ── SOR TAB ─────────────────────────────────────────────────────── */}
        {tab==="sor"&&(()=>{
          // Print styles for SOR - A4 layout
          const sorStyle=`
            @media print {
              .no-print { display: none !important; }
              .sor-page { page-break-after: always; }
              body { background: #fff; }
            }
          `;
          return(
          <div>
            <style>{sorStyle}</style>
            {/* SOR Controls - no-print */}
            <div className="no-print" style={{background:"#FFFDF5",border:`1px solid ${C.gold}44`,borderRadius:4,padding:"12px 18px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:10}}>
              <div>
                <div style={{fontSize:10,fontWeight:600,letterSpacing:2,color:C.stone,fontFamily:T.sans,marginBottom:2}}>SCHEDULE OF RATES</div>
                <div style={{fontSize:11,color:C.stone,fontFamily:T.sans}}>Client-facing rate card. Shows unit rates for all items across all trades. Print or share at first appointment for SOR review.</div>
              </div>
              <button onClick={()=>window.print()} style={{background:C.ink,color:C.gold,border:"none",borderRadius:3,padding:"9px 18px",fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:T.sans}}>🖨 Print SOR</button>
            </div>

            {/* SOR Document */}
            <div style={{background:C.white,borderRadius:4,border:`1px solid ${C.border}`,overflow:"hidden"}}>
              {/* HEADER */}
              <div style={{background:C.ink,padding:"28px 32px",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{fontFamily:T.serif,fontSize:11,color:C.gold,letterSpacing:6,marginBottom:6}}>IKIGAI INTERIOR</div>
                  <div style={{fontFamily:T.serif,fontSize:22,fontWeight:300,color:"#fff",marginBottom:4}}>Schedule of Rates</div>
                  <div style={{fontSize:10,color:C.stone,letterSpacing:1,fontFamily:T.sans}}>FOR REFERENCE ONLY — SUBJECT TO FINAL QUOTATION</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:9,color:C.stone,letterSpacing:1.5,fontFamily:T.sans,marginBottom:3}}>PREPARED FOR</div>
                  <div style={{fontFamily:T.serif,fontSize:16,fontWeight:300,color:"#fff"}}>{client.name||"—"}</div>
                  {projectName&&<div style={{fontSize:11,color:C.terra,fontFamily:T.sans,marginTop:2,fontStyle:"italic"}}>{projectName}</div>}
                  <div style={{fontSize:10,color:C.stone,fontFamily:T.sans,marginTop:4}}>{client.ref||"—"} · {client.date||todayStr()}</div>
                  <div style={{fontSize:9,color:C.stone,fontFamily:T.sans,marginTop:2}}>{ent.label}</div>
                </div>
              </div>

              {/* INTRO NOTE */}
              <div style={{padding:"14px 32px",background:"#FDFBF7",borderBottom:`1px solid ${C.border}`,fontSize:11,color:C.stone,lineHeight:1.7,fontFamily:T.sans}}>
                All rates stated are per unit and exclusive of GST unless otherwise indicated. Quantities, scope and final pricing to be confirmed in the formal quotation. Rates are subject to site conditions, material selection and project complexity.
              </div>

              {/* TRADES */}
              {TRADES.map((trade,ti)=>{
                // Group items by zone for zoned trades
                const zoneGroups={};
                if(trade.noZone){
                  zoneGroups["_all"]=trade.items;
                } else {
                  trade.items.forEach(item=>{
                    const z=item.zone||"Whole House";
                    if(!zoneGroups[z])zoneGroups[z]=[];
                    zoneGroups[z].push(item);
                  });
                }
                return(
                  <div key={trade.id} className="sor-page" style={{borderBottom:`2px solid ${C.border}`}}>
                    {/* Trade header */}
                    <div style={{background:C.creamD,padding:"10px 32px",display:"flex",alignItems:"center",gap:12,borderBottom:`1px solid ${C.border}`}}>
                      <span style={{background:C.ink,color:C.gold,borderRadius:3,padding:"3px 10px",fontSize:10,fontWeight:700,fontFamily:T.sans,letterSpacing:1}}>{trade.code}</span>
                      <span style={{fontFamily:T.serif,fontSize:16,fontWeight:300,color:C.ink}}>{trade.name}</span>
                      {trade.note&&<span style={{fontSize:10,color:C.stone,fontFamily:T.sans,fontStyle:"italic",marginLeft:8}}>— {trade.note}</span>}
                    </div>
                    {/* Column headers */}
                    <div style={{display:"grid",gridTemplateColumns:"36px 1fr 70px 100px",gap:0,padding:"5px 32px",background:"#F5F0E8"}}>
                      {["#","DESCRIPTION","UNIT","RATE (SGD)"].map((h,i)=>(
                        <div key={i} style={{fontSize:9,fontWeight:700,letterSpacing:1.2,color:C.stone,textAlign:i===3?"right":"left",fontFamily:T.sans}}>{h}</div>
                      ))}
                    </div>
                    {/* Items */}
                    {(()=>{
                      let itemNo=0;
                      const rows=[];
                      const zones=trade.noZone?["_all"]:ZONE_ORDER.filter(z=>zoneGroups[z]);
                      zones.forEach(zone=>{
                        if(!trade.noZone&&zone!=="_all"){
                          rows.push(
                            <div key={`zh-${zone}`} style={{padding:"5px 32px 3px",background:C.cream,borderTop:`1px solid ${C.border}`}}>
                              <span style={{fontSize:9,fontWeight:700,letterSpacing:1.5,color:C.gold,fontFamily:T.sans}}>{zone.toUpperCase()}</span>
                            </div>
                          );
                        }
                        (zoneGroups[zone]||[]).forEach(item=>{
                          itemNo++;
                          const ep=item.price;
                          rows.push(
                            <div key={item.id} style={{display:"grid",gridTemplateColumns:"36px 1fr 70px 100px",gap:0,padding:"6px 32px",borderBottom:`1px solid #F5F0E8`,alignItems:"start",background:item.addon?"#FEFCF8":"#fff"}}>
                              <div style={{fontSize:10,color:C.stone,fontFamily:T.sans,paddingTop:1}}>{itemNo}</div>
                              <div>
                                <div style={{fontSize:12,color:C.ink,fontFamily:T.sans,lineHeight:1.45}}>
                                  {item.addon&&<span style={{border:`1px solid ${C.gold}`,color:C.gold,borderRadius:2,padding:"0 3px",fontSize:8,fontWeight:700,marginRight:4}}>+</span>}
                                  {item.desc}
                                </div>
                                {item.carpentry&&<div style={{fontSize:9,color:C.stone,fontFamily:T.sans,marginTop:2}}>Premium ×1.15 · Luxury ×1.30 available</div>}
                              </div>
                              <div style={{fontSize:11,color:C.stone,fontFamily:T.sans,paddingTop:1}}>{item.unit}</div>
                              <div style={{fontFamily:T.serif,fontSize:13,textAlign:"right",color:ep>0?C.ink:C.stone}}>
                                {ep>0?fmt(ep):<span style={{fontSize:10,color:C.gold}}>POA</span>}
                              </div>
                            </div>
                          );
                        });
                      });
                      return rows;
                    })()}
                  </div>
                );
              })}

              {/* FOOTER */}
              <div style={{padding:"20px 32px",background:C.ink,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
                <div>
                  <div style={{fontFamily:T.serif,fontSize:12,color:C.gold,letterSpacing:3,marginBottom:4}}>IKIGAI INTERIOR PTE LTD</div>
                  <div style={{fontSize:10,color:C.stone,fontFamily:T.sans}}>UEN 202041797K · GST Reg 202041797K</div>
                  <div style={{fontSize:10,color:C.stone,fontFamily:T.sans,marginTop:2}}>work@ikigaiinterior.com · +65 8188 7556 · www.ikigaiinterior.com</div>
                  <div style={{fontSize:9,color:C.stone,fontFamily:T.sans,marginTop:2}}>Centennial Tower L18, 3 Temasek Ave, Singapore 039190</div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:9,color:C.stone,fontFamily:T.sans,marginBottom:2}}>SCHEDULE ISSUED</div>
                  <div style={{fontFamily:T.serif,fontSize:12,color:C.gold}}>{todayStr()}</div>
                  <div style={{fontSize:9,color:C.stone,fontFamily:T.sans,marginTop:4}}>@ikigai_interior</div>
                </div>
              </div>
            </div>
          </div>
          );
        })()}

      </>)}
      </div>
    </div>
  );
}

// ── APP ROOT ──────────────────────────────────────────────────────────────────
function App(){
  const isAdmin=window.location.search.includes("admin");
  const[screen,setScreen]=useState(isAdmin?"admin":"list");
  const[activeQuote,setActiveQuote]=useState(null);
  const openQuote=q=>{setActiveQuote(q);setScreen("builder");};
  const newQuote=()=>{const q=blankQuote();openQuote(q);};
  const newVO=parent=>{const q=blankQuote(parent);openQuote(q);};
  const saveQuote=data=>{
    const versions=loadVersions();
    const idx=versions.findIndex(v=>v.id===data.id);
    if(idx>=0)versions[idx]=data;else versions.unshift(data);
    saveVersions(versions);
  };
  const goBack=()=>{setScreen("list");setActiveQuote(null);};

  if(screen==="admin")return <AdminPanel onBack={()=>setScreen("list")}/>;
  if(screen==="builder"&&activeQuote)return <QuoteBuilder initData={activeQuote} onSave={saveQuote} onBack={goBack}/>;
  return <VersionManager onOpen={openQuote} onNew={newQuote} onNewVO={newVO} onAdmin={()=>setScreen("admin")}/>;
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
